body:
  text: 凡例一古今方書不下數百種而或效或不效未堪盡攸茲只取其經驗之最神者彙集一編因顏之曰丹方彙編二子自幼酷好單方凡有見聞必勤筆登録或業醫之所珍祕者亦不吝重物以購得之搜索十載約有八百餘方屢試輒效今春發願公世因遍採方書熟知向所祕録者皆系古名醫之所制故每方下明載之欲人知所自由也三諸症單方奇效者甚多然太冗繁恐反令人一時難擇故每症只選十中之一以備急需四諸方或得效於實而不宜於虛者或獲濟於寒而不利於熱者俱不妄載以誤人即有立見神效者亦必注明虛實寒熱之所宜五方藥若利害太甚者不敢亂載是編所登皆已所驗過幸勿畏懼加減以致無效六凡草藥人所難識者俱不載入凡膏藥丸丹療疾固甚神異然必先預備一時不能救急載亦無益倘有發願施濟者至舍抄録無吝七豫不善攝生久患咯血經驗神方難嘗修合施濟而是編之校謬訂訛精力難勝悉托友人徐藝兄代為斧削其苦心亦與豫同偶也今豫舊患又作精力益加衰疲幸是書之得告成者實賴徐友之力居多八女科症候不一而調經保産最為緊要而慈幼亦莫先於保嬰九豫每加意於斯故先付剞劂但尚未遍行故又附列於後十是編所載丹方無不神驗只要專信服之自必見功久病久服其病自愈慎毋速期其效半途中止也古云服藥而不言吃藥者蓋謂人能信服其藥始效耳十一古今奇方不一而一人搜羅有限未經見聞者諒罄竹難書同人果有纍試歷驗之方幸祈抄録見示嗣容補入是編十二是書務期廣遠流通四方君子發心印施多部福有攸歸若能翻刻尤慰鄙懷錢峻漫識貿藥辨真假凡藥必選原枝看切方妙若現成切片者恐真偽高下難辨醫藥貿易多在市家辨認未精差錯難免諺云賣藥者雙眸用藥者隻眼服藥者盲瞽非虛語也許多欺罔百般巧詐明者竟叱其非暗者甘受其侮本資治病反致殺人雖上天責報於冥冥然倉卒不能察實或誤歸咎於用藥者之錯亦常有也但惻隱皆所固有市家豈獨無情皆因人畏價昂貨真實有眼不識世藥物賤價廉反接踵相售是以偽稀多充不顧罪積也今峻歷遭其禍目擊心傷辨真察類將親所試驗者略舉數端考正於後此誠生死攸關緊要非比小節尋常務要考究精詳辨其形色察嘗氣味真偽了明修制治療庶免乖違寧出高價毋為自欺人參短壯堅實圓而光潤力全今假者遍行不可不察但切開有心味雖甜收口略苦津反凋膩不如真者生津其色帶呆余者無二今人買通賣婆詐稱鄉宦帶剩或央親及親詐稱病後遺多俱當細察阿膠真者明徹如冰味甜全不焦苦世上甚少竟勸勿服假者或帶緑或焦苦或帶臭氣皆系牛膠墨煎成損胃傷脾更有雜用賤藥煎成或枯燥或柔倿或味香有砂黑漆色帶緑光俱假目今時醫動必用阿膠秋石等藥然後設計借名親友珍藏代買取利害人不淺遇此切不可信淡秋石輕鬆入口即煬者真稍帶硬者必充小粉石膏忌服自制辨正咸秋石雪亮者真紫金錠店中亦有真者但內麝香甚貴少以加入須嘗口中香竄麝入觸鼻者真香緩者無效犀角明亮氣香者真今多牛角做充不香或帶氣味可辨龍骨紋細五色舐竟黏舌者佳青黑勿用膽星必牛臊氣暈苦異常黃黑明亮堅倿者真今多用豬膽假造誤人或枯乾或黑軟手息不明潤可辨牛黃要嫩黃輕虛重疊可揭氣息微香摩指甲竟透者真龜膠或黃色帶臭氣者假麝香味辛手指捻去松者真倿如丸者假原個要皮薄帶黃毛少飽滿而軟真皮黑厚硬毛多味淡者假冰片如梅花細瓣輕潔微白氣甚燻人者真若質重如砂細碎者假其片要厚薄不等若做成光圓者假熊膽偽者甚多但取一粟米大滴入水中若線不散者真或以米粒大點水中運轉如飛者良緩者假也虎脛骨黃白可服稍帶黑色乃藥傷大毒忌服要長帶扁者真若帶圓脊駝缺陷不平如三角樣者假羚羊角須看角彎中尖細有挂痕者真或耳邊聽之集集有聲者良其疏漫無痕枯老者假也鹿茸要如琥珀色三四五寸長肉飽滿者力全太長或枯黑無用恐是麋茸太細短又嫩恐是毛茸滴乳石必要如雪冬淋糖長五六寸明亮中空色白者真若乳突出而不如淋糖長者假翠膽礬成塊如雞卵大顏色青碧如琉璃擊碎縱橫解皆成疊方真今市多以青礬用醋揉假充宜辨雲母要白澤作片成層可折通透輕浮者真陽起石要明亮如鷺鷥毛者真琥珀要如血色熟透於布下拭吸得芥子者真硃砂有以雄黃充入宜細看蛤蚧有花斑起發光亮者真以四腳蛙充者當辨花蕊石打開有花白斑點者真無者假輕粉明如雪片粒粒槍水𠤭起者真色暗粒細無槍𥭎者假蟾酥舐舌上甜麻揭舌者真不麻者假沉香油潤切如黃蠟者真今賣黑色如牛角樣者假忌用母丁香如棗核大者真如細釘者少效木香多有用青木香欺人宜辨要堅硬形如枯骨苦口黏牙者真青木香細小蘇合油香只用如膏油赤色無滓香極芬烈塗上手背香透手心或如黏膠者真陳皮凡使勿用乳柑皮皺子皮忌服今市家多用充入誤人不可不辨真橘皮紋細色紅而薄內多筋脈其味苦辛香為真柑子皮紋粗色黃而厚內多白膜其味反甜而辛無效柚子皮其味甜多辛少最厚而虛其紋更粗色黃內多膜無筋性冷害人忌服川貝味甜輕鬆者真質硬味苦者假白朮味甜枝苗極細根多雖葉有迹方是野術有效賣者多種味淡或苦枝苗粗大光沃無力勿服地黃皮老瘩疙堅實菊花心者佳光潤者土種雖大無效蘇子假充甚多需帶青草香氣者真雲茯苓堅硬切片光亮玉色者真白而鬆者土出無效羌獨活紫色節密為羌黃色成塊為獨黃耆直如箭桿柔軟如綿肉白心黃味甜者佳血竭敲斷如鏡光亮取摩指甲紅透方妙川續斷要如雞腳節節斷皮黃皺者方真巴戟要中心紫而鮮潔者為真乳香透明如滴乳頭者良有用松香假充須察阿魏切開五色柔軟者真太軟如泥者假川芎形擇重實潔白為良油者勿用桂枝味辛甜香竄者真味淡者無用川連類鷹爪連珠根毛細密有菊花黃心者真若皮色太黃或毛粗而疏或頭尾等粗實心者俱忌服白豆蔻味辛香入口暈涼真草蔻充者味不暈涼可辨棗仁粒粗胞滿色紫佳細扁色淡者無用首烏有做成大者置地中年餘即生成但皮嫩有筋可辨啞片假者甚多要柔軟必帶青香者真附子頂平肉如鐵色滋潤者佳西附子肉乾白大而無力三七味甜以末投豬血中血化為水者真漆濕者以物蘸起細而不斷斷而急收塗竹木上速乾者佳山茹菰根鬚多者真根少者假香薷直長香烈者真細短不香者是土出食之腹痛忌用藿香味辛香烈者真不香者假忌用懷山藥堅實細白者真大而空松者假沙蒺藜黑色粒粗者真青色粒細者假肉桂紫潤味甜甚辛香烈人者真今多假者色紫油潤可觀切片有細花白點不甚辛香者忌服諸症歌訣中風中風身溫口多涎卒然昏倒不能言急用通關開孔竅化痰順氣治當先瘟疫瘟疫衆人病一般四時不正外邪干要分春夏秋冬治莫把溫寒一樣看中暑中暑中熱不相同行人中熱在日中避暑深堂名中暑暑分寒熱不相攻中濕中濕亦因內外傷外衝風雨內酒漿發為腫滿渾身痛利水和脾發汗長脾胃脾胃之氣要衝和胃司納受脾司磨莫使溫寒一失節損傷元氣病難瘥痰飲痰多數濕津液化隨氣升降上中下百病之中兼有痰隨症調治應無價咳嗽咳謂無痰卻有聲嗽謂無聲卻有痰有痰有聲為咳嗽化痰理嗽自然安喘急喘急須分肺實虛夾寒夾熱緊相隨痰火諸般皆作喘治之莫要有差疑哮吼哮吼肺竅積寒痰令人齁喘起居難豁痰降火加調理不遇良方病不安瘧疾瘧是風暑不正邪為寒為熱兩交加新瘧可散亦可截久病還當兼補佳痢疾痢因濕熱並氣滯赤傷血分白傷氣赤白相雜氣血傷清熱理氣先通利泄瀉泄瀉注下濕傷脾燥濕利水補脾虛若還久瀉腸虛滑收澀還將正氣提霍亂霍亂吐瀉心腹痛轉筋寒熱頭沉重內傷外感使之然切忌米湯休早用嘔吐嘔謂有聲吐有物寒熱傷脾食即出和胃清火化痰涎半夏生薑以為率翻胃翻胃噎膈一般病三陽熱結吐無定莫將燥劑反助邪養血生津調胃應咳逆咳逆氣衝上作聲聲聲不斷火相刑諸逆上衝皆屬火化痰降氣自安寧吞酸吞酸濕熱在胃口故作酸水刺心頭化痰清火平肝氣蔬食能調病自瘳痞滿痞滿胸膈不通泰令人夯悶久不快一消一補慢調和莫行利藥徒傷害脹滿脹滿起來空以鼓四肢不腫其中苦莫將酸利損天和制肝補脾以為主水腫水腫是濕本是脾通身浮腫總為虛利水和脾兼順氣峻攻瀉水病難醫積聚積有五種聚有六五臟六腑各所屬左血右氣中食痰慢慢消熔無欲速五疸五疸總是濕與熱遍身發汗小便血清熱利水濕自除但將此治無他説失血失血大抵俱是熱陽盛陰虛妄行血補陰清火抑其陽引血歸經血自歇癲狂癲為喜笑或不常安神養血是奇方狂為痰火因太盛平肝清火化痰良邪祟邪祟難千壯實人神虛氣弱致相侵只扶正氣虛邪退莫費工夫禱鬼神頭痛頭痛須詳十二經各經用藥要分明頭腦盡痛手足冷此為真痛命當傾耳病耳聾男右因色欲女人左聾緣忿怒左右俱聾厚味傷補虛順氣病除去鼻病鼻病不聞臭與香素常痰火肺間藏每遇風寒必便塞清金降火最為良口舌口舌生瘡心臟熱涼劑徐投火自滅口苦肝熱移於膽此因謀慮而不決牙齒牙痛濕熱有胃火有風有蟲痛非可清火除濕更誅蟲或搽或服皆安妥眼目眼角屬心白屬肺上下眼色皆屬脾瞳仁屬腎黑肝木五臟精華眼見之咽喉喉痹一名為乳蛾多因酒色七情過痰水上壅為腫痛祛風清火得平和心痛心痛即是胃脘疼清熱解鬱藥通靈更有蟲食氣心痛臨時審候要分明腹痛腹痛有熱亦有寒死血食積並濕痰時痛時止應是熱綿綿不止作寒看腰痛腰痛豈止屬腎虛三因五種要推之或溫或涼或汗下更兼補腎是良規疝氣疝氣七種要詳推寒水筋血氣狐頽濕熱在內因寒里陰腫小腹痛如錐腳氣腳腫名為濕腳氣不腫乾腳氣之謂麻則因風痛是寒腫乃是濕宜分利痹痛五痹手足痛不仁不過風寒濕氣侵發散風寒除濕氣管叫疼痛不纏身消渴消渴要分上下中上屬肝經中胃者下消屬腎共三消能食不食分治也濁症濁症白色屬腎虛赤者心虛有熱隨赤要清心白補腎化痰燥濕要須知遺精遺精症是心腎虛補精養腎澀精宜濕熱傷脾精亦泄理脾除濕再無遺淋症五淋有熱屬膀胱小便淋漓痛難當血石膏勞肉五症疏理清熱是良方小便閉小便不通有五閉氣血痰熱風者是悉宜用吐把氣提上竅既通下竅利大便閉大便不通有虛實陰結陽結閉不一或攻或補用溫涼臨時對症無差失痔漏痔漏名有二十四酒色氣風食五事未破名痔破為漏祛風除濕解毒治腸澼腸澼即是大便血腸風糞前色鮮潔臟毒糞後血暗濁臟寒臟熱不同列諸蟲諸蟲多因濕熱生生於腹內狀難明上攻心腹痛還定或安或下便清寧婦人婦人屬陰多生氣氣鬱成病最難治諸病兼理氣調經香附是女真仙劑種子人生無後實堪傷誰識仙翁有祕方只在心田存一點管叫蘭桂滿庭方妊娠妊娠母病至胎動母病醫痊胎是和胎若不安觸母病但安胎氣母無疴産育臨産之婦莫驚惶行動頻頻莫臥床瓜熟須如蒂自落若還用藥要安詳産後産後諸症要扶虛惡露流通是所宜更有多般發熱症未可輕教汗下宜小兒小兒十病元傷食食傷發熱成諸疾早當消導莫遲挨免致驚痧痰食積驚風急慢驚風症不同慢宜溫補急宜攻更有慢脾風篤症枉叫醫士費神功疳疾五疳心肝脾肺腎冷熱