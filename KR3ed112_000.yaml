front:
  text: 原序先考亭立公一生樂善不幸中年棄世垂沒囑峻曰吾家世代種德汝當善承先志峻泣而志之不敢忘爾時終天悲痛急患失血幾危逾年稍愈母氏許諭峻曰汝犯此症功名之念已矣吾見汝自幼好輯方書不如留意岐黃一可以養生一可以濟世庶不負先人好善之囑也峻遂矢志醫業所夕不怠一聞靈驗奇方必重禮購求或遇急病即對症試之其有效者輯選取焉如是十有餘年積集約八百餘方癸未春舊患復發迄今三載病勢日增峻已自料不起矣將欲為善後計而藐茲孤兒襁褓未離嘗聞積德可以貽後而善書中惟舍藥施方最為切要幸得友人徐藝兄素存與善之心去後刊刻陰隲注證並微今鐸二書行世而舉業之餘亦嘗旁及小道爰同心遍採神方彙集成編今夏方得脫稿而峻舊患大作命在須臾但是編積十年之辛勤志欲公世豈可不終厥事因促梓人速竣其工兼托世伯沈子翁暨世兄遂公代為廣施勸布流傳海內峻在九泉亦可藉以瞑目也康熙丁亥夏月吳興錢峻青掄自序附刊丹方補遺序余聞之古人君子出則為良相處則為良醫又曰一介之士苟存心於利物於人必有所濟嗟乎良相其難矣良醫豈易易哉夫羲農肇技於黃軒扁盧精能於白髮膏肓督任之中神其術而為良者青年朱李由此選也余不敏少所指授弗能為良醫竊意濟人利物之事隨可行居當與四方君子咨諏藥石又嘗周歷吳越諸邦所在延訪古先名手醫方若干匯為一册試之輒效用之通神私竊自喜藉此可以利物濟人矣比年秋謀付梓人流之於世適新安俞君曉園重刻經驗丹方類編余既重樂此書之大有利濟於人物也余正重樂此書之適相浹恰於鄙里也爰揀生平編集奇方一册附刊於後夫故未敢妄附於為良之列亦用自托於一介存心之意云爾乾隆十七年壬申秋九日金溪周郎鶴仙氏謹書於金陵光霽書室自序余幼承庭訓無時不以與人為善四字冰兢於夙夜間然嘗恐淺見寡聞不足以付廣濟之懷而醫之為道少小善病每經歷吳越輒訪高人異士講明而切究之故嘗宣於口筆於書採於方選於藥幸得此身完然無恙迄今年五十而精神氣力百倍從前蓋其所經驗者固已多矣顧余嘗謂人生而無濟於人者君子謂之虛生苟徒自為調攝而祕藏不以告人則黃帝岐伯之術何以流傳至今而盧公扁鵲何以有不自醫之説哉故嘗與大兄爾介仲兄彥方精選藥料祕製丸散若寸金丹催生丸及太乙靈膏普施廣送毫不取其直此固遠近咸知者然猶以為傳藥不如傳方蓋傳藥則吾一家能辨而傳方則人人可辨也乃網羅舊聞托拾新編幾費採擇而後付諸剞劂將以布諸海內俾遠鄉僻壤之家鹹得一目瞭然思所以預防而療治之以無負余意其有未曾經驗者概不録書既成仍顏之曰丹方類編蓋吳門錢青掄先生舊有此書沈子懷玉曾為重梓而徐士瑢與慕琛吳尚採諸公皆有序余徵求原本不可得倩友抄録一通今踵刻多方另為開雕而仍用其名者不敢忘其所自也且亦遂余凜遵庭訓與人為善之素志也故序數言於簡端以告當世之閲是編者乾隆十有七年歲次壬中秋月新安俞煥曉園氏書
