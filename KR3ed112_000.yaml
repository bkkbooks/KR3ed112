斬關奪旗之功每服必用參兩許駕驅其邪而補助真氣否則不惟無益適足以取敗矣觀先哲用耆附參附等湯其義可見範氏家居醫録稀涎散治中風昏昏如醉形體不收或口角流涎須臾不救急用此散吐之新皂角四挺去黑皮明礬一兩共為細末每用五七分溫水調灌令微微稀冷或涎出一二升待醒後乃用藥調治毋使大吐恐過劑傷人屢效不可具述宗奭曰此法用皂莢一兩生礬五錢膩粉五錢水調一二錢過咽即吐用明礬者分膈下涎也孫氏祕寶方中風口噤荊芥穗為末酒服二錢立愈賈似道云此方前後用之甚驗曾公談録舒筋丸治男婦手足不能伸屈乳香沒藥當歸骨碎補炒木香白附木鱉白膠牛膝虎筋骨炙枸杞木瓜甜瓜子京墨地龍酒洗淨焙燥各一錢五分麝香少許各為末蜜丸如梧子大每服六十丸酒下此方不養血不去風大為奇矣百一選方口眼喎斜用白鱔一條裝入竹管內尾上用針深刺出血血攤絹帛上乘熱貼之如歪向左貼右邊歪向右貼左邊立時即正正即洗去萬病回春豨蘞丸治四肢麻痹骨節痠痛腰膝無力偏風中風皆試驗過壯盛者宜服五月五日六月六日九月九日採豨蘞草去根莖花實淨洗曝乾入瓶內層層灑酒與蜜蒸之又曬乾再蒸如此九次則氣味極香美焙搗篩末蜜丸服甚效本草浮萍一粒丹治左癱右瘓口眼喎斜三十六般風並癩風偏正頭風亦治七月十五日採蕩內紫背浮萍曬乾為末細篩煉蜜為丸如彈子大每日以黑豆淋酒下一丸服過百粒即為全人若須小風症服二三十丸足矣附刻陰隲文注證預防中風凡人初覺大指次指麻木不仁或手足少力肌肉微掣數年內有中風之症宜先服愈風湯天麻丸竹瀝枳朮丸各一料此治未病之先也愈風湯初覺風動服此可免倒僕又治中風內邪已除外邪已盡當服此以導諸經久服大風盡夫縱有微邪加減治之黃耆蜜炙人參當歸酒洗用白芍酒洗生地枸杞杜仲薑酒炒秦艽肉桂甘草羌活獨活防風薄荷菊花細辛麻黃蔓荊子白芷知母石膏柴胡黃芩地骨皮枳殼麩炒蒼朮米泔洗每服一兩生薑三片煎空心服十劑萬病回春天麻丸治未病之聖藥天麻牛膝酒洗萆薢另研元參各半兩川羌三兩五錢當歸酒洗一兩半生地酒洗四兩獨活兩半大附子泡去皮臍五錢蜜丸每服四錢空心酒湯任下服後飢則食不飢且止醫宗必讀竹瀝枳朮丸化痰清火順氣除濕祛暈眩療麻木養氣血健脾胃白朮土炒二兩枳實麩炒陳皮去白白茯苓黃連薑汁炒條芩酒炒當歸酒洗楂肉白芥子半夏白礬皂角生薑水煮乾南星制同上白芍酒炒各二兩蒼朮泔水制鹽水炒用二兩為末神麯六兩薑汁竹瀝各一盞煮糊為丸每服百丸食遠淡薑湯下有火者更宜醫書龔子才曰余屢試前方有效有不效不效者多是脾肺之虛腎氣之弱惟宜補中益氣湯六味丸兼而進之可免中風之患矣徐藝術曰薛氏有云預防者當養氣血節飲食戒七情遠幃幕風氣痛附痿症脫頦痛風者遍身骨節走注疼痛也謂之白虎歷節風都是血氣風濕痰火皆令作痛或勞力寒水相搏或酒色醉臥當風取涼或臥潮濕之地或雨汗濕衣蒸體而成痛風在上者多屬風在下者多屬濕治用活血疏風消痰去濕羌活湯加減凡治痛風用蒼朮羌活酒芩三味散風行濕之妙藥耳一切痛風肢節痛者痛屬火腫屬濕不可食肉肉屬陽火能助火食則下遺遺溺內有痞塊雖油炒熱物魚面切宜戒之所以膏粱之人多食煎炒炙煿酒肉熱物蒸臟腑故患痛風惡毒癰疽者最多肥人多是濕痰瘦人多是痰火浸酒神方七輪鱉甲醋炙淨菊花防風杜仲丹皮石菖蒲去蘆根牛蒡人參枸杞各一兩白朮萸肉白茯苓桔梗黃耆殭蠶遠志去心甘草汁煮牛膝蒼耳熟地白芍萆薢石蟹花粉荊芥白附天麻白星獨活陳皮蒼朮米泔浸白芷川芎當歸各五錢川羌秦艽虎骨酒浸油松節各一兩用無灰酒二斗浸之春夏二七秋冬三七固毋泄氣每日空心三次各飲一杯藥渣焙乾研細好酒和丸如梧桐子大每服七十丸空心好酒下昔竇中書方中年患此四肢不舉者五載纍醫罔效偶遇李讓有此祕方修合服之半月身輕目清病遂除因求此方江西淮王傳骨節風痛川烏大者三十枚生用全蠍二十個生用生黑豆二十一粒地龍去泥土酒洗淨五錢為末入麝香一分糯米飯和丸緑豆大每服七丸夜臥酒下微出冷汗一二服便瘥赤水玄珠五汁膏治風痛不拘久近立時見效薑蔥韭白蘿蔔各五斤打汁菜子半斤打汁煎成膏滴水成珠外加麻油東丹石灰收煉如汁多加多汁少加少做膏藥貼愈採抄本左經丸治手足不遂筋骨諸痛遍身風瘡大草烏去皮臍木別去殼白膠香五靈脂各三兩五錢斑蝥五枚去頭足醋炒磨細用生黑豆去皮為末一升醋和丸如芡實大每服一丸溫酒磨下治筋骨痛未經針刺者三五服見效此方曾醫一人軟癱風不能行不十日見效大為奇妙赤水玄珠風氣痛老薑鳳仙葉香油川椒末共搗擦痛處或鳳仙子煎湯洗亦效一用魚膠四兩薑汁一碗投膠內熬膏攤布上貼患處即止醫書神應膏治骨節疼痛乳香沒藥各末一兩皮膠三兩薑汁二碗先將薑汁砂罐內煎數沸入皮膠化開將罐取下盛灰土方入乳沒末攪勻成膏用不見煙的狗皮攤膏貼患處仍用鞋底炙熱時時尉之神效忌鐵器萬病回春風濕臂痛防風歸全各二錢麻黃五錢秦艽一錢木瓜豨蘞草海風藤白茄根各三錢酒二斤沙罐內煎四五滾在臂上熏洗每日二次不可怠略錢青揄云家慈嘗患此症親試立效後治他人無不響應白鳳仙花浸燒酒飲亦愈經驗良方治兩手疼痛麻木當歸川芎白芷酒芩炒黃連羌活蒼朮米泔制防風桔梗南星半夏俱薑汁製桂枝甘草各等分生薑三片水煎服萬病回春痛風遍身骨節走痛者是油松節晚蠶砂蒸酒每日常服愈祕方集驗痰注臂痛天仙藤白朮羌活白芷各三錢薑黃六錢製半夏五錢每服五錢薑五片水煎服楊仁齋方濕痰腫痛經年不能行者水紅花蘿蔔莢白金鳳花水龍骨花椒槐芩甘草蒼朮金銀花各等分煎熏患處水稍溫即洗之甚驗單方全集神仙外應膏川烏一斤為末用陳醋入砂罐內慢火熬如醬色敷患處如病一年敷後一日發癢二年二日發癢癢時令人將手拍癢處拍至不癢為度先用升麻皮硝生薑煎水洗然後敷藥不可見風祕方集驗痿症斷不可作風治而誤用熱燥攻風之藥凡不痛者為痿屬虛痛者為痹屬實症各有別蓋痿病生於肺熱因血氣少虛火盛制肺金肺葉焦枯宗筋不潤金既不能生水以致肝木乘脾脾土受傷則骨痿軟而筋馳縱四肢難舉不能伸縮轉動狀若癱瘓者須久服此劑當歸白芍杜仲牛膝黃耆白朮炒各一錢熟地二錢知母黃柏各八分水煎空心服祕方集驗脫頦起於腎肺虛損元神不足或笑談高興忘倦一時元氣不能接續所致患者平身正坐令人以兩手托住下頦向腦後送上關竅隨用絹條兜頦於項上須避風連服煎劑不然邪風外受必致痰涎壅盛口眼喎斜而風中臟腑十無一瘳矣附子滾水泡去皮臍六分當歸殭蠶酒炒去絲各二錢人參半夏白朮白茯苓各一錢五分天麻火煨陳皮各一錢甘草三分川芎八分燈心四十根生薑三片水煎服祕方集驗虛勞血證回生膏血虛火旺消補兩難服此神效人乳男用女胎乳女用男胎乳藕汁白酒頭漿白蜜童便臨時取用各等分煎膏滴水不散為度每晨空心湯下半盞龍眼湯更好病深者多服全愈忌服寒涼藥不救單方全集獨乳延生丸茯苓一斤打碎用牛乳數斤人乳更妙在銅器內慢煎隨煎隨擾俟稀稠以茯苓收之曬乾磨細糯米湯和丸如梧子大每早白湯服二三十丸屢效陰隲文注證刻二仙膏牛乳十斤福園十斤煎膏酒服大補虛損有回生之功扶衰仙鳳酒治五勞七傷並婦人赤白帶下神效用白毛烏骨雄線雞一隻將繩吊死退去毛屎切作四塊入生薑四兩膠棗半斤陳酒六斤裝入大壇內泥封口重湯煮一日涼水拔去火毒空心連薑棗食之一用烏骨童雄雞一隻碗鋒去毛肚雜勿犯鐵器肚內入建蓮肉砂鍋內用酒煮爛雞頭放鍋外隨便食之治虛損亦神驗俱載醫書童子癆乾血勞並一切勞蟲神效活黃鼠郎一個入瓶內將泥搗爛封口用籠粳火煨一日取出研末每服一錢酒下男用雄女用雌神效抄本傳尸癆豬腰子兩個童便二盞無灰酒一盞新瓷盛之泥封炭火溫養自戌至子時止待五更初溫熱取開飲酒食腰子病危者一月見效平日瘦怯者亦可用邵真人經驗方血崩血餘三兩絲瓜灰四兩好酒送下即愈經驗單方血熱妄行生荷葉生艾葉側柏葉生地黃各等分搗丸如雞子大每服水二鍾煎八分服祕方集驗虛汗黃耆黑豆煎湯飲之半月全愈祕方集驗腫脹鼓有十症氣鼓食鼓熱鼓風鼓勞鼓濕鼓蟲鼓血鼓疳鼓胸腹腫脹並四肢腫脹者如遇患人腹上用手按之有窩可治脈壯者易治脈細並臍窩腫出者難治雞里金一具真沉香砂仁各三錢陳香圓五錢共末每服錢半薑湯下一用雄烏豬肚一具入大蒜四兩煮爛連服五七個忌鹽醋醬一百日單方經驗黃帝曰水與膚脹鼓脹腸覃石瘕石水何以別之岐伯曰水始起也目窠上微腫如新臥起之狀其頸脈動時咳陰股間寒足脛腫腹乃大其水已成矣以手按其腹隨手而起如裹水之狀此其候也膚脹者寒氣客於皮膚之間𪔣𪔣然不堅腹大身盡腫皮厚按其腹窅而不起腹色不變此其候也鼓脹者腹脹身皆大大與膚脹等也色蒼黃腹筋起此其候也腸覃者寒氣客於腸外與衛氣相搏氣不得榮因有所繫癖而內著惡氣乃起息肉乃生其始生也大如雞卵稍以益大至其成如懷子之狀久者離歲按之則堅推之則移月事以時下此其候也石瘕生於胞中寒氣客於子門子門閉塞氣不得通惡血當瀉不瀉衃以留止日以益大狀如懷子月事不以時下皆生於女子可導而下鼓脹者即單鼓脹也始而止於單是腹脹日久不治則四肢浮腫矣其症亦有二一為濕熱所感一為虛寒所致但虛寒者無過於服金匱腎氣丸為妙如系濕熱用雞屎白炒沉香色研篩一升盛磁罐內浸好酒二斤面封口煮三炷香澄清隨意溫服或用真黃牛肉一斤河水煮爛加皮硝一兩隨意食之二三日其腫即消至重者再服全愈百日之內切忌酸鹹生冷麵食葷腥油膩硬物十種水病並根源症狀方法一清水先從左右肋腫起根在肝大戟二赤水先從舌根起根在心葶藶子三黃水從腰腹起根在脾甘遂炒四白水從腳腫起根在肺桑白皮五黑水從外腎腫起根在腎連翹六玄水從面腫起根在外腎芫花醋炒七風水從四肢腫起根在骨澤瀉八石水從腎腫起根在膀胱藁本九高水從小腹腫起根在小腸巴豆去皮油十氣水或盛或衰起根在腹赤小豆上十般腫病各有根源種種不同看十種病根除一味倍多餘九味等分焙末蜜丸梧子大用赤茯苓湯吞三丸不拘時每日三服愈後服補藥其方肉桂去皮乾薑肉豆蔻赤茯苓莪朮醋煮川芎桔梗各等分為末每服三錢白湯下空心食前日午晚各一服二方治水腫百發百中獲濟無數赤水玄珠禹餘糧丸許學士朱丹溪皆贊此方為水脹之神藥蛇含石大者三兩鐵銚燒紅傾醋內候冷取出研極細禹餘糧石三兩真針砂五兩淘淨炒乾用醋二鍾同餘糧銚內煮乾更用銚並藥燒紅傾淨磚上候冷研細羌活木香茯苓川芎牛膝酒浸桂心白豆蔻大茴炒蓬朮泡附子泡乾薑泡青皮京三稜炮白蒺藜當歸酒浸各五錢末入煎三味拌勻丸如梧子大空心白湯下三五十丸日三服更以溫補藥補之神效醫宗必讀脾病黃腫青礬煅成赤珠當歸酒浸七日各四兩百草霜三兩為末以所浸藥酒打丸如梧子大每服五丸至七丸酒下一月效祖傳七世方鼓脹水腫乾絲瓜一條去皮打碎入巴豆十四粒同炒以豆黃為度去豆用瓜陳米炒黃米與巴豆先須等分又去瓜用米研細清水為丸每服百粒滾湯下腫脹不服藥自去水真水銀粉二錢巴豆去油四兩生硫黃一錢研成餅貼臍上黃水自去貼時先以綿一斤鋪臍上次貼藥餅外用帛縛之如人行三五里黃水自下待三五度去餅溫粥補之久患者隔日取水祕方集驗水腫腹大或遍身浮腫用棗一斗入鍋內以水浸過用大戟根苗蓋之瓦盆合定煮熟取棗不時食之棗盡決愈本草一用馬鞭草一斤鼠尾草一斤水一石煮取五斗去渣再煎令稠以粉和丸黃豆大每服二三丸加至四五丸神效肘後方水腫用土狗一名螻蛄焙乾為末用上半節即消上身之水下半節即消下身之水左可消左右可消右方士以此方神奇醫宗必讀腹脹黃腫亞腰葫蘆蓮子燒存性每服一個食前溫酒下不飲酒者白湯下十餘日見效簡便方敷藥治腹滿如石或陰囊腫大先用甘草嚼後用此大戟芫花甘遂海藻各等分為末用釅醋調面和藥攤綿紙上覆貼腫處仍以軟綿裹住醫宗必讀白遊風腫螺螄肉入鹽少許搗泥貼之神效摘玄方腹皮青色不速活須臾死胡粉是錫粉非鉛粉鹽熬色變以摩腹上子母祕録痰鼓陳葫蘆一枚去頂用箸松其子將酒灌入仍用頂封好重湯煮數沸去子飲酒一吐而愈元氣旺者斷宜用此單方全集反胃噎膈此症年滿六旬者難治糞如羊糞者難治吐白沫者難治胸膈嘈痛如刀割者死反胃噎膈總是血液衰耗胃脘乾稿稿在上者水飲可行食物難入名曰噎膈稿在下者食雖可入良久復出名曰反胃二證名為膈大抵氣血虧損復因悲思憂慮則脾胃受傷血液漸耗鬱氣生痰痰則塞而不通氣則上而不下妨礙道路飲食難進噎膈所由成也脾胃虛傷運行失職不能熟腐五穀變化精微朝食暮吐暮食朝吐食雖入胃復反而出反胃所由成也二者皆在膈間受病故通名膈也此症之所以疑難者方欲健脾理痰恐燥劑有妨於津液方欲養血生津恐潤劑有礙於中洲審其陰傷火旺者當以養血為亟脾傷陰盛者當以溫補為先雄黃二豆丸治噎食神效大烏梅肉二十枚水洗硇砂雄黃各二錢乳香一錢百草霜黑豆緑豆各四十九粒為末和梅打丸彈子大用一丸噙化待一炷香方行經絡用麵餅一個熱湯泡開吃之無礙為妙仍有礙一二日後再一丸三五日除根赤水玄珠噎膈第一次服皮硝兒茶礦灰各一撮麝香一分為末燒酒調服第二次服沉香二錢草果七錢砂仁木香五靈脂各五錢豆蔻一兩蓽澄茄二錢白朮二錢薑汁製為末好酒調服一錢第三次服蓽澄茄三錢麻雀兒七枚煮熟點茄末食第四次服豬牙皂角半斤棗子一斤煮熟去皂角服第五次服黑豆一升黃柏黃芩黃連各一兩煮豆食有效江西楊大人傳一用阿魏一錢干屎三錢為末五更薑片醮食立愈趙王凼方一用白水牛喉去兩頭節並筋膜節節取下米醋一碗炙至醋盡為末每用一錢米飲下愈法天生意一用甘蔗汁二碗薑汁一碗每服一碗日三服即不吐醫宗必讀噎膈初起老薑一斤童便浸七日土內埋七日洗淨為末一兩白朮土炒淨末一兩飯丸梧子大每晨空心服一錢米飲下有效懷德堂録噎膈反胃鼓脹亦治沉香蘇子廣皮各二錢官桂一錢木香三分蘿蔔子三錢俱為末每用三分配狗寶一分須用好泉水煎通草湯空心調服採醫書翻胃吐食黃蜆殼田螺殼要久在泥中者各等分炒成白灰每二兩入白梅肉四兩搗和丸再入砂盆內蓋定泥固燒存性研極細每服二錢人參縮砂湯下或陳米湯亦可一用地龍糞一錢大黃七錢木香三錢為末每服五錢無根水調服三服見效忌煎炒醋等赤水玄珠一用乾柿餅三枚連蒂搗爛用酒服甚效醫宗必讀久患咳噎連至四五十聲者薑汁蜜同煎三次立效抄本凡反胃症得藥而愈者切不可便與粥飯惟以人參五錢陳皮二錢老黃米一兩作湯細啜旬日後方可食粥倉稟未固不宜便進米穀常致不救醫宗必讀病後胃弱不能飲食者蓮子肉炒米各四兩茯苓二兩為末砂糖二兩調勻每服五六茶匙不拘時服白湯下祕方集驗隔食隔氣韭汁梨汁薑汁人乳各二盞飯上蒸熟服之三日後再服如神抄本痰飲百病多兼有痰故病以化痰為先善治痰者兼治氣氣順則痰利痰脈浮滑者宜降浮實者宜吐沉小者不宜吐恐虛故也凡治痰症不可全用利藥過使脾氣虛弱則痰反易生而多若脾虛生痰者用健脾燥濕便要利補兼用陳皮白朮為佐也痰乃穢濁之物宜吐不宜瀉瀉則反加別症矣竹瀝達痰丸能運痰於大腸不損元氣神效半夏二兩泡七次薑汁浸透曬乾切片瓦上焙熟白茯苓陳皮去白淨二兩炙草人參各一兩大黃酒浸透曬酒芩各三兩沉香五錢礞石一兩用焰硝一兩和勻放入銀罐內用瓦蓋好鹽泥封固曬乾炭煅如金黃色上為末竹瀝碗半薑汁二鍾入鍋內熬一刻將藥和搗磁罐盛之曬乾仍以竹瀝薑汁如前法搗曬七次仍用竹瀝和丸如小豆大每服百丸食遠米飲下萬病回春風痰頭暈嘔逆目眩面色青黃脈弦者半夏生南星寒水石煅各一兩天麻五錢雄黃三錢小麥面三兩為末水和成餅水煮浮起濾出搗丸每服五十粒薑湯下極效古法機要寒痰氣喘青橘皮一片展開入巴豆一粒麻扎緊火上燒存性研末薑汁和酒服天台李翰林治莫秀才到口便止張果醫説痰火天花粉一斤切片初以藜汁一鍾拌曬次以蘿蔔汁一鍾拌曬次以竹瀝一鍾拌曬為末每服一錢好茶下懷德堂録一用桑白皮四兩款冬二兩薄荷四兩甘草二兩芽茶四兩陳香園四兩卜子五錢杏仁五錢鵝管石五錢水白糖為丸服衛生備要咳嗽雞鳴丸治男婦咳嗽吐血諸虛如神從來咳嗽十八般只因邪氣入於肝胸膈咳嗽多加喘胃嗽膈上有痰涎大腸咳嗽三焦火小腸咳嗽舌上干傷風咳嗽喉多癢膽嗽夜間不得安肝風嗽時喉多痹三因嗽時船上灘氣嗽夜間多沉重肺嗽痰多喘嗽難熱嗽多血連心痛膀胱嗽時氣多寒暴嗽日間多出汗傷寒嗽時冷痰酸此真神仙真妙訣用心求取雞鳴丸知母炒四兩阿膠麩炒五味各三兩桔梗人參各五錢陳皮去白馬兜鈴麻黃旋覆花甘草炙各一兩杏仁去皮尖葶藶紙上焙半夏薑汁炒各三兩蜜丸彈子大每服一丸五更烏梅生薑棗子湯下萬病回春瓊林散治遠近哮嗽其效如神桑皮四兩五味甘草炙陳皮各二兩栗殼一斤去蒂膜醋浸三夜曬乾再入醋浸曬乾冷蜜調服赤水玄珠久患喘急杏仁童便浸換半月焙乾每以棗許同薄荷蜜煎服神效抄本哮喘白果炒草一個麻黃三錢蘇子半夏制款冬花各二錢桑皮蜜炙二錢杏仁去皮尖一錢炒芩一錢五分甘草一錢水煎分二服金陵一鋪家以此方治哮喘無不效者因以此起家攝生方呂祖仙傳蘆吸散治新久咳嗽百藥無功服此神奇鵝管石陳皮各二錢半款冬花蕊五錢年老及虛者加人參五分冬月加肉桂錢半忌鐵器為末分七服每夜仰臥將藥一服作三次入竹筒內口噙竹筒近咽喉用力一吸將溫水一口送下不可多吃水忌油膩並鹽七日藥完後亦少用些油鹽至半月後不忌萬病回春夢遺白濁不夢而自遺者心腎之傷居多夢而後遺者相火之強為害若夫心動於欲腎傷於色或強忍房事或多服淫方敗精流溢乃為白濁瑞本丸專治夢遺苦參黃柏各二兩牡蠣蛤粉葛根白螺螄殼煅青蒿各一兩神典為丸如梧子大空心白湯七十丸卻酒一個月終劑而愈百發百中赤水玄珠夢遺鐵屑研末炒棗肉為丸每晨服一錢大妙衛生備要一方用乳香指大一塊臨臥時含口中醒即吐之數次自愈祕方集驗丸方專治夢遺石菖蒲遠志桑螵蛸益智棗仁牡蠣龍骨鎖陽等分丸服隨手而愈赤水玄珠五珠金瑣丹治夢遺白濁能起死回生黃豆緑豆糯米小麥各一斤熟地半斤各炒熟勿令黑加入蓮鬚五味茯苓各四兩龍骨牡蠣煅各四錢白洋糖拌勻作糕不拘時白湯下或用蜜為丸每服八錢鹿含草浸酒服治夢遺神效衛生備要氣虛白濁黃耆鹽炒八兩茯苓一兩為末每服一錢白湯下經驗方淋閉白濁白茯苓四兩作匱以豬苓四錢入內煮二十沸取出曬乾去豬苓為末黃蠟搜和丸彈子大空心嚼咽一丸以小便清為度忌米醋屢試屢驗綱目徐藝稗曰凡人欲動則情熾情熾則神疲神疲則精滑而夢失故寤寐時須制欲靜養心無他出默坐片刻然後屈足側臥向無走失慎勿沉溺欲海神不守舍致失攝生之道也傷寒瘟疫附冒風寒方發散傷寒不問陰陽二症倉卒無藥生薑一兩蔥白十莖好酒二大碗煎半熱服蓋被周身汗透即解勿令汗太過忌大葷五七日春依此方夏月蔥薑減半冬月加黑豆二合炒煎服尤效如旅次煎藥不便生薑五片蔥白四莖紫蘇葉三錢無此禾細茶代泡湯熱服祕方集驗停食傷寒陳香糟六兩生薑四兩水菖蒲根四兩鹽二兩共搗炒熱為餅敷胸前痛處火尉之內響即去如口渴任吃茶水待大便下惡物愈單方全集傷食雞硬肝內黃皮燒灰酒服大小停食不化服之即愈一用面研沖酒澄清去腳服之最效三月初三日收野薺菜花根曬乾貯放煎湯服之即消徐龍耀方四時感冒風寒初起蔥白連須五根生搗沖酒服祕方集驗大頭瘟黃連黃芩各五錢人參三錢桔紅元參各二錢生甘草連翹鼠黏子薄荷葉板藍根馬屁勃各一錢白殭蠶升麻各一錢柴胡桔梗各二錢為末湯調時時服或拌蜜為丸噙化此方全活甚衆赤水玄珠時疫不染蒼朮三錢三分三釐米泔水浸切片炒甘草一錢六分六釐撫芎八錢五分乾葛一錢三分六釐薑三片連根蔥頭三個水二碗煎八分空心服已病者愈未病者不染也祕方集驗蝦蟆瘟以金線田雞搗汁水調空腹頓飲極效本草發明闢疫用雄黃末菜油調塗鼻中空心再服雄黃酒一杯永不染方書瘧疾夫瘧者因外感風寒暑濕內傷飲食勞倦或飢飽色欲過度以致脾胃不和痰留中脘然無痰不成瘧脾胃屬土有信來去不失其時若移時或早或晚者是邪無容地瘧將好也瘧疾來時呵欠怕寒手足冷發寒戰大熱口渴頭痛腰胯骨節痠痛或先寒後熱或先熱後寒或單寒單熱或寒多熱少或熱多寒少一日一發受病淺也易治間日發者或二日連發住一日者皆難治治宜在表無汗者散邪湯為主有汗者正氣湯為主在半表半裡者柴苓湯為主分利陰陽而未已者人參養胃湯加減若用截藥吐出黃膽水者瘧自愈也不可一二日早截早則邪氣閉塞而成壞症又不可遲截遲則元氣衰憊而成虛怯當在三四日就截為好須待熱退身涼方可飲食也切不可帶熱飲食恐不消而成痞一名瘧母痞散成鼓者有之矣散邪湯治瘧初起增寒壯熱頭疼身痛無汗甘草三分羌活紫蘇荊芥白芷麻黃白芍防風各一錢生薑蔥白三根水煎露一夜次早服有痰加陳皮有濕加蒼朮夾食加香附萬病回春正氣湯治瘧初起無增寒壯熱頭痛口乾有汗桂皮甘草各三分茯苓半夏薑汁炒白芷青皮川芎草果去殼檳榔前胡柴胡麥冬各一錢生薑三片棗一枚預先煎服萬病回春柴苓湯治瘧發寒熱病在半表半裡陰陽不分柴胡黃芩人參半夏豬苓澤瀉白朮茯苓肉桂甘草生薑三片棗二枚煎服無汗加麻黃有汗加桂枝汗多加官桂熱多加黃芩萬病回春治瘧陳皮半夏制當歸各一錢柴胡黃芩澤瀉茯苓各八分甘草炙升麻乾葛各五分生薑二片棗頭一枚桃頭五個水煎熱服忌生冷魚面據月坡云方有百種唯此穩當無誤須服二十劑服五六劑後加人參更妙陳百坡方絶瘧十日後神效常山酒煮曬乾知母貝母草果各半錢水煎五更熱服渣酒浸發前後王隱者云豫用此方四十年奇效不能盡述切勿加減以致不效養生主論又方二十日後神效歸身青皮赤生首烏白生首烏老薑皮各三錢河水井水各一碗煎八分露一夜臨來日五更熱服即愈經驗方外絶藥大蜘蛛三枚信砒一錢雄黑豆四十九粒為末滴水為丸豌豆大先夜以一丸獻於北斗下次早紙裹插耳內立效宜明方間日瘧白朮一錢茯苓澤瀉豬苓柴胡半夏各一錢黃芩熱多錢半寒多一錢加薑三片大棗二枚露一夜臨日五更服神效仙方三日瘧一服立止蒼朮三錢制首烏五錢白朮二錢炒知母五分粉草一錢水四碗煎半雞鳴服寒多生薑六錢當歸五錢熱盛當歸六錢生薑五錢將發服愈單方經驗久瘧似癆當歸酒洗下同牛膝各五錢鱉甲橘紅貝母各三錢鮮首烏五錢薑皮二錢半柴胡錢半二味熱多有汗去之加竹瀝一盞水二鍾煎半露一夜發日五更時溫服單方全集痢疾痢疾赤屬血白屬氣赤白相兼膿血雜痢皆因脾胃失調飲食停滯積於腸胃之間多是暑濕傷脾故作痢疾起於肚腹疼痛大便裡急後重小水短赤身涼脈緩者易治身熱脈弦急者難治痢初起一二日元氣壯實者先用玄白散虛弱者用芍藥湯疏通積滯三四日後元氣漸弱調和飲食加減治之如不止服參歸芍藥湯調理脾胃補益元氣久不愈方可服真人養臟湯加減治之切不可驟用粟殼等藥止塞太早恐內積氣未盡成休息痢亦恐毒攻上胸腹飽悶作疼噁心嘔噦發厄難治因毒氣攻胃故也先水瀉後膿血者是腎傳脾難愈先膿血後水瀉者是脾傳腎易愈又有痢下鮮血者如塵腐色者如屋漏水者大孔如竹筒者嘔吐發厄煩躁身熱者俱難治也如魚腦髓者身熱脈數大半生半死也大抵治痢疾一二日元氣未虛治宜疏通積滯此通因利用之法三四日後不可疏通恐元氣虛也當清熱解毒調養脾胃為主經云行血則便膿自愈調氣則後重自除若大腸積滯壅塞而後重法當疏導之若大腸氣虛下陷而後重法當開補之玄白散治痢初起裡急後重腹痛血窘迫壯盛者一劑愈大黃二錢生地赤芍歸尾檳榔枳殼麩炒牽牛赤痢用黑白痢用白赤白相雜黑白兼用半生半炒須搗碎莪朮黃連各二錢暑月加香薷炒一錢水煎空心溫服以痢二三次為度萬病回春治一切痢不拘男婦小兒木香方圓一寸一塊黃連五錢用水半升煎乾去黃連切木香焙末分三服第一服陳皮湯下第二服陳米飲下第三服甘草湯下有一婦人久痢將危夢大士授此方因而得愈孫氏祕寶方黑神散治腸滑之痢石榴一個煅煙盡次研仍以酸榴一塊煎湯服神效無比醫方考遠年痢上好豆酒暖熱一二鍾內入薑汁一二茶匙不宜多服數十次自愈一用哺退雞子殼毛坑上挂燥研極細末將一分百滾湯送下即愈一用臭椿樹皮一兩五錢雨前茶錢半扁柏葉二錢五分棗頭烏梅各二枚酒水各一碗煎須緩緩服恐泛俱出單方噤口痢男婦湯飲不下者用烏梅一斤敲碎置盆中將十餘碗水煎泡熱令病人坐盆上待熱氣衝上肛門溫即洗其人亦睡去即扶上床煎粥湯候之如思飲食即與粥湯半碗少頃與稀粥半碗不宜多若小兒照方減半可也黃連三錢人參錢半水一鍾煎七分溫服藥入口即蘇一用烏梅二個夾住蝸牛一條繩扎住安口中化水滴下愈一用木鱉子研細和麵作餅貼臍中亦效俱集驗方疫痢疫痢者一人有病他人即傳染者是也蒼朮一兩水三鍾煎至二鍾去朮入白朮防風白芍羌活人中黃各一錢煎至一鍾溫服祕方補遺便祕脫肛因久痢所致者用蝸牛燒灰豬脂和敷立縮經驗良方腸風下血方藥雖效責在節欲戒酒方可除根附臟毒下血大便脫肛腸風便血壯實者宜用槐角子五錢黃連枳殼地榆貫衆各三錢水煎服昔潘大司馬患此孫文垣用此方治之一服即止因書其方於壁間遇有便血者治之無不立愈大腸瀉血虛盛兼宜發灰五錢雞冠花柏葉各一兩為末臥時酒服二錢來早以溫酒投之一服見效普濟方下血隨四時方向採側柏葉燒灰研末每日米飲下二錢百一選方腸風下血豆腐末入袋濾出漿者帶渣取來鍋內炒燥研末每三錢如下紫血塊者白糖湯下紅血塊者砂糖湯下雖遠年便血乖危者服之神效每日用三次祕方集驗腸風熟黃芩炒黑四兩黑棗頭半斤煮爛去皮核搗爛和芩末為丸梧子大早晚共服四錢終劑即愈懷德堂自驗方臟毒下血大黃酒浸九蒸九曬二兩槐花三兩木耳三兩郁李仁皂角子象牙屑條芩血餘灰升麻荊芥穗各五錢共為末煉蜜為丸赤豆大外以四物湯加蒲黃各一兩為衣米湯送下空心及下午各二錢服完立愈三吳醫案昔有一人患臟毒下血數年自分必死得一方只以乾柿燒灰飲服二錢遂愈又一通判病此十年服此方一服而愈本草大便脫肛多主氣虛人參黃耆川芎當歸升麻水二碗煎八分食前服如血虛加芍藥地黃血熱加炒黃柏虛寒加炒黑乾薑外以五倍子末托而上之或用萆麻子四十九粒搗爛貼頂門上即收收後即急洗去其藥祕方集驗便血淋漓並小便閉塞淋有虛弱不同此專治壯實之症虛者貴服補藥方效男婦血淋酒瓶頭箸葉三五年者妙每用七個燒存性入麝香少許陳米飲下日三服有人患此二服即愈百一選方淋痛或血糞或沙石脹痛川牛膝一兩水煎服一婦患此十年服效直指一用蜀葵花根洗銼煎五六沸服之如神衛生寶鑑熱淋如血蠶紙燒灰入麝香少許水服二錢極效方也衛生家寶尿血兼治肺疽吐血或舌上出血若鼻衄吹內立止茅草根車前子湯調發灰下效赤水玄珠男子便血黑豆一升炒黑研末熱酒淋之去渣飲神效活人心鏡菟絲子丸治淋症菟絲子酒蒸五錢澤瀉二錢五分桑螵蛸炙用五錢為末蜜丸梧子大每服二錢空心米飲下醫宗必讀小便閉塞田螺一枚加鹽一撮和殼生搗或加大蒜一顆同搗貼臍下一寸三分用絹帛緊扎之自通一用麥面和作圈圈臍外鯽魚一尾連鱗腸搗爛入麝香三分生蜜四兩和勻填滿臍上圈內以碗覆之熟睡立通一用獨郎大蒜一枚梔子七枚鹽花少許搗爛塗紙上貼臍良久即通未通塗陰囊上立效又尉法蔥白三斤切碎炒熟絹包分兩袋更替尉臍下單方俱載便閉垂死桃枝柳枝木通川椒枯礬各一兩蔥白七個燈心一把水三十碗煎半用瓷罐熱盛一半熏外腎周圍以被圍繞不令外風得入冷即易之其效大奇醫宗必讀傷寒後便閉生薑八九塊杵碎水十餘碗麻布五六尺同煎數沸用桶盛候可通手以布頻尉小便良久用紅豆末一錢江茶二錢井華水調服小便如注赤水玄珠霍亂吐瀉附痧斑霍亂者揮霍撩亂也外感內傷陰陽乖隔以致上吐下利偏陽多熱偏陰多寒卒然而成危如風燭得吐利者名濕霍亂輕蓋所傷之物盡出也上不得吐下不得利所傷之物不得出死甚速須用鹽湯探吐得出則寬切莫與穀食入口即死直至飢甚吐瀉過二三時辰方可與稀粥食之玉液散治伏暑吐瀉便赤煩渴滑石四兩藿香丁香各一錢為末米湯下二錢普濟方傷暑霍亂吐瀉豬苓澤瀉各七分赤茯苓乾葛各一錢花粉二錢香薷黃連甘草白朮各五分泄極加升麻七分黃芩石膏各八分熱極加石膏知母各一錢腹痛加芍藥炒五錢肉桂三分寒極亦然薑三片煎服祕方集驗五更泄名腎泄蓋陰感而然脾惡濕濕則濡而困困則不能制水水性下流則腎水不足五味去梗二兩吳茱萸五錢同炒香為末每服二錢陳米飲下採醫書腹痛難忍取白扁豆葉三十張搗汁沖井水服立驗青浦徐氏抄本中寒腹痛並絞腸痧胡椒七粒以布一層包裹不拘自己或他人嚼碎納臍內隨用膏藥貼上再以熱手按之蓋被而臥少傾腹中作熱或有汗出則寒氣散而痛自愈矣祕方集驗如遇痧腸急將病人頭頂紅髮拔去腿彎指頭皆刺出血將口抉開喂白鴨腳花開花時連根葉風乾包貯三梔泡湯灌下即活救急良方發斑不出用白蠟燭點火照視心胸腹背隱隱紅斑不起在於肌內取山羊乳飲之即起透而自痊矣經驗方心氣痛心痛即胃脘痛須分新久之殊若明知身受寒氣口食寒物而病於初得時當用溫散溫利之藥若病稍久而成郁鬱則蒸熱熱久必生火若行溫劑寧無助火添病乎此病雖日數多不食不死若痛方止便吃物與病安之後又縱恣口腹病再發難治心痛神方硃砂木香各三錢黃占一兩化開為丸如緑豆大每服七丸燒酒下極痛時方服效衛生備要急心痛牙關緊閉欲死老蔥白五莖去皮須搗膏用匙送入咽喉中灌以麻油四兩但得下咽即蘇少傾蟲積皆化黃水而下神效瑞竹堂方一用麻油一鍾煎滾衝入燒酒一小鐘乘痛急飲祕方集驗蛔咬心痛心頭痛急不能當吾有仙人海上方萹蓄醋煎通口咽管叫時刻立安康一用烏梅三個川椒十四粒煎服愈單方全集心口痛良薑酒洗七次焙研香附子醋浸七次焙研病因寒得薑末二錢附末一錢因怒得薑末一錢附末二錢寒怒兼有各錢半米飲加薑汁並鹽服效韓飛霞醫通書胃脘疼痛雄黃一錢末烏梅三錢肉為末如豆大俟胃口痛時須酒服輕者兩丸重者三丸集驗方心氣痛生芝麻半升候痛時不必看隨手取來不拘多少放銅鍋內炒黑為末好酒送下一服除根祕方集驗神仙九氣散專治膈氣寒熱氣驚氣怒氣山嵐障氣積聚堅牢不能飲食發則欲死香附薑黃甘草等分為末每服鹽湯下三錢當神方一切氣痛天台烏藥小者酒浸一夜炒茴香炒青橘皮去白炒良薑炒各等分為末溫酒童便調下衛生家寶一切諸痛腰痛脅痛腹痛積痛項強遍體痛腎虛腰痛一切皆治破故紙酒浸炒杜仲去皮薑汁浸炒各一斤胡桃肉去皮二十個為末用蒜搗膏一兩和丸梧子大空心酒下二十丸婦人淡醋湯下常服壯筋活血烏須美顏古方腰閃枳殼桔梗各八分甘草紅花各五分杏仁炒去皮尖製半夏木通防風烏藥各一錢當歸一錢水煎服祕方集驗諸閃凡閃腰打傷閃肭並手足損傷不出血但有青紫內傷者先以蔥白搗爛炒熱將痛處擦遍隨用生大黃研末薑汁調敷儘量飲以好酒即三月半年不愈者神驗祕方集驗脅痛小茴一兩炒枳殼五錢皮炒為末每服二錢鹽湯下神效經驗方脅痛紅及半身甚發水泡者紅花五分粉草二錢大瓜蔞一個重一二兩連皮搗爛一劑而愈真神方也醫旨緒餘冷氣腹痛艾葉同香附醋煮為丸有奇效古方酒積作痛或瀉者白滑石三兩粉草五錢肉果五錢白芍酒炒一兩五錢木香三錢紅曲四錢神麯和丸每早晚白湯送下二錢自除三吳醫案項強筋急不可轉折肝腎二臟受風也沒藥二兩宣州木瓜三個取蓋去瓤乳香二錢五分同入木瓜內縛定飯上蒸爛研成膏每用三錢入生地汁半盞無灰酒二盞化服愈本事方遍體作痛由氣血凝滯所致者冷氣腰痛四肢拘攣俱用此方玄胡索當歸桂心各等分為末溫酒服三四錢隨量頻進以醉為度遂痛止蓋玄胡索能活血化氣第一品藥也昔一人病此痛不可忍服此而效趙侍制因導引失節肢體拘攣亦用此數服而愈醫書痞積丹溪云積聚癥瘕不一積者停蓄之總名也宜以在中在左在右分治凡塊乃有形之物氣不能成形痰與食積死血而已在中為痰飲在右為食積在左為死血大法咸以軟之堅以削之行氣開痰為主不拘何膏藥二張以一張揭開用白信末五分摻之小兒二分再以一張貼上將背面貼患處以布包好數日化為水矣治皮裡膜外者效尤速如貼後腹中脹悶乃痞積將散服枳殼八分大腹皮鹽水洗一錢蘇梗八分厚朴一錢二分青皮一錢莪朮八分山楂一錢烏藥六分香附錢半縮砂五分廣木香三分水煎空心服三四劑自愈或用生鵝血乘熱好酒泡滾儘量沖服隨症新久多寡自消化無形病深多服數次或用松香四兩雨水煎乾萆麻子肉二兩搗皮硝五錢共搗為膏攤布上量痞大小攤貼加麝香二釐痞消膏自落或用大紅風仙花十二朵獨郎蒜一枚雄黃二分同搗青布做膏騎筋貼少刻即去一方用南星獨郎蒜各一枚雷丸半丸麝香每歲一分共搗敷單方總集神功助化散其藥夜服大小便見惡物為度此方神效不可俱述萹蓄麥芽瞿麥穗甘草各五錢沉香神麯各二錢半木香錢半大黃二兩男用淡竹葉甘草煎湯酒調下女用紅花燈心當歸煎湯酒調下忌油膩動氣之物及房事一月神效赤水玄珠腹內龜病詩云人間龜病不堪言肚裡生成硬如磚自死殭蠶白馬尿不過時刻軟如綿普濟方三聖膏貼痞積石灰十兩細篩炒細用好醋熬成膏入大黃末一兩官桂五錢攪勻瓦器封貯紙攤焙暖貼患處醫宗必讀消痞阿魏二錢麝香一分銀硃一錢丁香五個良薑二錢蒜頭十枚水紅花子不拘多少先將阿魏一錢大蒜紅花子三味研作膏余為末入膏內狗皮攤貼衛生備要萬金不易妙靈丹治男婦好吃生米茶葉布頭泥炭瓦塊並酒積氣塊心痛肚痛飽悶小兒疳積一服除根妙妙甘草春夏四錢秋冬五錢大黃春夏六錢秋冬五錢黑醜一兩二錢取豆末檳榔一兩二錢雷丸五錢共為細末每服三錢五更糖湯下天明利下積物抄本貪食一切物如茶葉壁泥桴炭石灰生米之類芝麻一碟雄黃三分始服白湯下三日後只吃炒芝麻半月愈一用生棐子一斤每日蘸砂糖吃數十粒以盡為度或兼史君子肉四五枚半生半熟同食更妙單方四寶丹若食生米用生米麥芽炒一斤史君子肉二兩檳榔南星各一兩薑汁製若吃茶葉用茶葉一斤炒史君子肉檳榔南星照前若吃黃泥用壁土一斤火炒余俱照前若吃黑炭用炭一斤余俱照前共末蜜丸梧子大每服五十丸清晨砂糖水下大效萬病回春諸蟲作痛口中清涎流出湯飲不進危在旦夕者烏梅花椒生薑煎服經驗方追蟲取積散檳榔二錢陳皮八分木香五分黑醜頭二錢共末研勻每服五錢小者三錢用砂糖湯調下五更服行三四次以米湯補之忌魚腥油膩三五日醫方纂要治蛔蟲方用苦楝根刮去外粗皮取內白皮二兩以水三碗煮半去渣用晚粳米三合煮粥空心先以炒肉一二片吃引蟲向上然後進藥粥一二口少傾又吃一二口漸加至一碗或二碗其蟲盡下而愈萬病回春黃疸患此症者忌食油面豬魚雞鵝等物症有五者之分終無濕熱之異蓋濕熱積於脾胃之中久而不散故其土色形於面與肌膚也黃疸地骨皮三兩砂仁炒一兩黑棗四兩砂仁藏內用水二碗煎半露一夜五更熱服深者三帖必效一法用東引桃根一把細如箸者於清明早晨勿令雞犬婦人見切細水一大升煎半空心服要時時飲清酒一盞則眼中黃色易散否則散遲徐之才家祕方一用雞子三十六黃一個連殼燒灰醋一合溫服鼻中蟲出為效外臺祕要谷疸食已頭眩心中拂鬱不安飢飽所致胃氣煎沖而黃苦參二兩研龍膽草一兩碎牛膽汁一兩入蜜丸如梧子大每服五十丸空心生薑甘草湯下祕方集驗酒疸身目俱黃心中懊憹足脛滿尿赤面黃赤斑因醉後胃熱身臥當風水濕得之也梔子十五個大黃一兩淡豆豉一兩枳實五個水煎服醫書色疸額黑身黃小腹滿急小便不利因房事後為水濕所搏而得之也硝石礬石各煅等分為末大麥粥汁調服二錢日進三服取汗祕方集驗陰瘧二疸肢冷自汗泄利便清脈沉遲者是陰黃耳鳴口淡怔忡微熱四肢無力嗜臥脈沉細寒熱泄白者是虛黃皆以理中湯治之人參白朮各三錢半甘草炙乾薑炮各一兩空心煎服蔓荊散治陰黃汗染衣涕唾黃蔓荊子為末平旦以井華水服一匙日再服二匙以知為度每夜小便中浸少許帛子各書日記色漸白則瘥不過服五升而愈醫宗必讀黃汗汗如梔子染衣因汗出入水澡浴所致黃耆赤芍茵陳各一兩石膏四兩豆豉麥冬各一兩甘草炙五錢為末每服五錢淡薑湯食遠服自愈祕方集驗頭痛諸症附腦漏鼻症頭乃諸陽之會症非一端大約宜分十二症治之丹溪云頭痛多主於痰甚者火多有可吐者有可下者又若眉眶痛者屬風熱與痰有肝虛而痛者才見光明則眶痛甚有眉稜骨痛者眼不可開晝靜夜劇屬痰頭風者經云首風之狀頭面多汗惡寒當先風一日則病甚頭痛不可以出內至其風日則其病稍愈蓋其人素有痰火風寒客入骨髓而然婦人多患頭風者以無巾幘御風寒也有偏有正有熱有風有血虛在左屬風與血虛在右屬痰與熱頭眩者目花黑暗旋倒也其狀頭眩目閉身轉耳聾如立舟車之上起則欲倒虛極乘寒得之故風則有汗寒則掣痛暑則煩悶濕則重滯此四氣乘虛而眩暈也或七情鬱而生痰動火隨氣上厥此七情致虛而眩暈也酒色過度腎虛不能納氣歸元使氣逆奔而上此氣虛眩暈也吐衄崩漏或産後失血脾虛不能收攝營氣使諸血失道妄行此血虛眩暈也都梁丸昔王定國病頭風至都梁求名醫楊介治之連進三丸即時病去因求其方用香白芷一味洗酒為末蜜丸如彈子大茶清或荊芥湯化下一用明天麻一兩大白芷三兩為末蜜丸每重二錢用一丸先將荊芥半錢細辛一錢煎湯細嚼藥丸下甚者不過一丸百一選方偏正頭風塗藥紫荊皮炒五兩獨活去節炒三兩白芷菖蒲各一兩蔥頭煎濃湯調敷藥到立止如神赤水玄珠熏頭風天南星一個艾五錢熏之抄本寒熱頭風童便一盞入蔥頭煎服陶隱君屢試方血虛頭風赤白首烏各五錢川芎紫蘇細辛白芍藁本各五錢甘草一錢煎服懷德堂録頭風乃風寒濕痛採單瓣白鳳仙花一瓶燒酒浸滿蒸熟去火性隨量飲出汗為妙單方全集腦漏雄豬膽一個熬稠如蜜藿香一兩攪勻為丸每服二錢白湯下單用藿香末吹鼻亦妙一用辛夷二錢羌活獨活防風藁本細辛各五分真艾一兩將前藥為末摻艾內卷作條點火熏鼻即愈醫家抄録腦漏流濃用破瓢白雞冠花白螄殼等分燒灰加血竭麝香各五分好酒灑濕熟艾連藥作餅貼頂門尉斗尉愈為度單方鼻淵即腦漏因風寒凝入腦戶與太陽濕熱交蒸乃成其患鼻流清涕或流黃水點點滴滴長濕無干白芷一兩蒼耳子炒辛夷仁各二錢五分薄荷五錢為末蔥茶清調服祕方集驗又方秦艽酒芩桑皮馬兜鈴各八分白芍一錢滑石石膏各二錢枳殼蔓荊各五分甘草三分服四五劑即愈新都治驗鼻痔瓜蒂炒甘遂炒各四錢枯礬五分松香五分為衣香油調硬此每用一丸入鼻內點痔化為臭水一日一次自爛下集驗方酒渣鼻血熱入肺而然當歸苦參各四兩末和勻酒糊為丸桐子大食後熱茶吞八十丸藥盡即愈祕方集驗鼻中息肉藜蘆三分雄黃一分蜜和日點三次勿點兩畔聖濟方赤鼻硫黃皮硝等分研如面臨臥擦一月全愈古方鼻塞萆麻子三百粒大棗一斤搗勻棉裹塞日易一月全愈聖濟方目疾目疾總論其症七十二種治之應究其源大約紅為熱白為冷癢為風澀為毒氣之作也風則散之熱則清涼之冷則溫補之氣結則調順之切不可用刀針點割偶得其愈出乎僥幸倘或不然終身之患又不宜過用涼藥恐冰其血凝而不流亦成痼疾當量人老少氣體虛實用藥又有腎虛者亦令眼目無光或生冷翳補暖下元益其腎水自愈治北方人與南方異北方之人患眼最多皆因日冒風沙夜眠火炕二氣交蒸治之多用涼藥北方人稟受原與南方人不同也治婦人又與男子異蓋其間有傷胎墜産之藥自當除去須以當歸為主可以活血其餘之藥對症而發小兒患眼又與大人異不過胎毒受孕之時過食熱物而然雖過百日一周亦是胎毒至一二歲間患眼者此是好食煎炒五辛之熱物使五臟受毒攻衝而後發也至如孩童之患眼有實無虛多熱無冷若遇患眼之稚子切不可以藥吹點之恐血氣未定致傷其目只可以敗毒散治之如痘疹之後毒氣鬱結於心肝二經氣不能泄攻發於眼目傷瞳仁者則又素無治法也目疾通治荊芥羌活甘草甘菊防風藁本黃芩當歸山梔赤芍白芷乳香沒藥各一錢全蠍三個水二碗煎一碗空心服凡目疾初起即至十餘日急服二三劑無不立愈如意為增減多不驗祕方集驗眼中起星取荸薺捶碎將水灑紙上成粉候乾刮取點患處古方洗眼奇方張道人從道藏內檢採普濟十方不論瞽目犯土雲霧風眼火眼昏花久洗自明用皮硝六錢桑白皮生一兩白水煎每遇日期熱洗數十次正月初五二月初二三月初三四月初九五月初五六月初四七月初三八月初十九月十二十月十二十一月初四十二月初四閏月照本月以上吉星日子乃通光明也其方千金不易屢試屢驗出道藏羊肝丸治男女肝經不足風熱上攻頭目昏暗羞明及障翳青盲等症黃連一兩末羊子肝一具去膜擂爛同連末為丸梧子大每食後暖漿水吞十四丸連作五劑瘥昔崔承元活一死囚囚後病死崔患內障逾年半夜獨坐耳階除蟋蟀之聲問之答曰是昔蒙活之囚今特報恩遂告此方崔服之不數日眼復明劉禹錫傳信方眼目障翳好焰硝一兩銅器熔化黃丹飛片腦各二分銅匙急炒入罐內收之每點少許其效如神克州朱秀才忽不見物朝夕禮天夢神傳此方張三丰仙方眼藥京師方好眼藥能治七十二眼疾冰片熊膽各一分潔淨加工研極細清晨點上如觀星若還低頭藥不靈十年瞽目無所見一點重開顯光明孫真人海上歌七十二種眼疾羊膽一枚割開入蜂蜜一錢線軋緊兩手揉勻白水煮一滾即取出涼水浸半日傾出內汁點之祕方集驗明目散薄荷甘草共天麻荊芥防風甘菊花當歸連翹枸杞子川芎白芷密蒙花等分各研為細末每服三錢只用茶勸君每日進一服瞳仁咫尺見天涯萬病回春昏花用童便煎菊花洗數次即愈願濟堂刊施取下翳膜蕤仁二兩去油入硼砂一錢麝香二分研勻收之去翳膜妙不可言本草赤腫胡黃連浸人乳點之小兒則塗足心古方暴發腫痛先將青布一塊水浸洗令乾另用生薑汁白礬末將布蘸搽眼胞上閉目少傾淚出痛止祕方集驗明目補腎兼治筋骨疼痛小紅棗十二個冷水洗淨去蒂甘州枸杞子三錢小馬料豆四錢水二碗煎半早晨空心連湯共食之若專明目枸杞子三錢菊花七朵去蒂每早白湯下久服青盲可以復明祕方集驗青盲雄鼠膽鼠膽最小略驚惶便碎矣鯉魚膽各二枚和勻滴之立效聖惠方肝虛雀目黃蠟不拘多少溶汁取出入蛤粉相和得所每用刀切下二錢以豬肝二兩剖開摻藥在內麻繩扎定水一碗入銚子內煮熟熏眼至溫並肝食之日二以平安為度效集驗方小兒雀目羯羊肝一具不用洗竹刀剖開入穀精草一撮瓦罐煮熟日食之屢驗忌鐵器衛生家寶天絲入目石菖蒲捶碎左目塞右鼻右目塞左鼻百發百中或用木梳垢為小丸放眼角邊即出危氏得效方煙渣入目小兒及好吃煙者誤犯如將別湯洗目愈洗愈疼必至眼瞎而後止須用亂頭髮或綜纓緩緩揉之即愈抄本沙塵入目取活蜣螂一枚持其斧於眼上影之即出徐氏抄録麥芒入目煮大麥汁洗之即出單方全集打傷眼睛如突出急揉進用生豬肉一片將當歸赤石脂末摻肉上貼之去毒血愈單方集驗耳疾耳聾一豆三斑不去油麝香冰片共同投蔥蜜為丸麥子大絮棉包裹耳口留三日之後黃水出不痛不癢不須憂若是此方無應驗罰做人間馬與牛一用上好新鐵片三塊咬口內用好瓷石塞兩耳靜坐其耳忽鳴而通有頃刻通者有坐數日通者祕方集驗蝸牛膏滴耳聾閉蝸牛一兩石膽鍾乳粉各二錢半甕盒盛末火煅赤入片腦子一字每以油調一字滴耳中無不愈者聖惠方耳後鋭毒危症也宜急治男女小兒俱效大天南星丙火存性為末醋塗三次即愈一用大黃一兩青末香三錢薑黃檳榔各三錢共末蜜調貼中留一孔效昔一人右耳後生一毒腫痛寒熱生生子用金銀花歸尾赤芍連翹殭蠶牛蒡子元參兩劑而愈新都醫案治耳虛鳴麝香少許全蠍十四個薄荷十四葉裹麝蠍瓦上焙乾研末滴水捏作錠子塞耳內極效一用巴豆菖蒲同研松脂黃占和條納耳中抽之神效綱目耳忽大痛如蟲走或流血或干痛蛇蛻燒灰吹入立止祕方也醫書摘要千金不換停耳丹耳膿不幹水龍骨一錢硼砂五分為末吹入耳門上用綿塞之二服斷除祕方彙纂百蟲入耳膽礬和醋灌入即出鱔頭燒研綿裹塞之亦出李時珍方壁蝨入耳稻稈灰煎汁灌入即死垂水而去江湖紀聞耳痹龍骨麝香輕粉枯礬等末吹入耳即愈抄本牙痛牙疳附烏須固齒方牙疼者乃屬陽明胃經也風熱上侵則有所感而舉之有熱有寒有蟲有濕熱皆能作痛牙疼症甚事多沒有效方怎奈何蟾酥麝香五靈脂每味一分研作末千金一笑散用一分絹片包上線扎緊咬在患處低著頭五般牙痛包除根海上仙方一用粗碗一隻川椒鋪底樟腦蓋面覆碗一個鹽泥封固慢火煅一夜次早研細每用一釐擦牙根立愈祕方集驗一用五倍子一枚稍開一孔用鹽填滿炭火中燒紅存性略出火氣研末以指擦牙漱津片時吐出數次即止單方全集取痛齒法白馬尾燒灰存性點上即落但不可輕點恐好齒沾著亦落一用白龍骨三錢末臨用大蒜一郎搗爛入末一二分拌勻貼痛處半支香時即下馬岐山方走馬牙疳五倍子青黛枯礬等分為末先以鹽水漱淨摻之立效一用銅青滑石杏仁等分為末擦之即愈邵真人方牙蝕透骨穿腮生南星一個剜空入雄黃一塊麵裹燒候雄黃作汁以杯合定出火毒去面為末入麝香少許拂瘡數日甚效經驗方齒血三製大黃末二錢用枳殼湯加童便調下即止醫旨諸餘固齒烏須豬牙皂角及生薑西國升麻與大黃水津旱蓮槐角子細辛荷蒂用相當青鹽等分同燒煅研細將來用最良牢牙固齒烏須鬢誰知世上有仙方若去白鬚用雞舌香雄為丁香雌為雞舌薑汁塗拔去白鬚即生黑者奇效咽喉諸證附口舌諸症咽喉腫痛者或喉痛生瘡者或閉塞者或紅腫結核脹痛者或喉閉不能言語俱是風熱痰火用清涼散加減或喉閉急症急刺少商穴在大指甲外側用三稜針放出毒血並豁吐痰涎為要喉閉先兩日胸膈氣緊出氣短促驀然喉痛手足厥冷氣閉命懸頃刻速用雞毛或鵝翎蘸桐油喉間攪探吐痰立開或用山豆根銜汁咽之亦開切忌牛黃入口不救如無藥如有藥不進者急將兩臂以手勒數十次取油發繩扎大拇指以針刺指甲邊即少商穴血滴下其喉即解男左女右重者兩手齊針單方全集急鎖喉風兼治單蛾雙蛾用升麻四兩銼碎水四碗煎一碗灌服或用皂莢捶碎擂水灌服即吐即不吐亦安或不用此方將巴豆去殼綿紙微裹隨左右塞鼻孔中立通或白礬三錢慢火熬化入巴豆肉二粒研爛候乾去巴豆取礬研末用少許入喉中取頑痰出立愈一用膽礬一塊含口中其痰涎自壅上吐盡即愈單方總集急喉痹其聲如鼾有如痰在喉中響者此為肺絶之候速宜人參膏救之用竹茹薑汁調下獨參湯亦可若服之早者十全七八次則十全三四遲則十不救一也赤水玄珠纏喉風纏喉風者熱結於喉腫繞於外且麻且癢也用牽牛鼻繩燒灰吹之甚效李時珍方一用淡白梅一個去核將蜒蚰一條嵌在梅內含之即瘥一用白殭蠶二錢研細生薑自然汁少許和水灌下立愈一用萬年青根頭切碎打爛絞汁灌下吐出痰即好倘口閉用牙刷掘開灌下如不吐再用發稍進喉間吐出即愈經驗方雙蛾單蛾者其形圓如筋頭生於咽喉關上或左或右雙蛾則兩邊俱生也若生於咽下為難治壁上蜘蛛白窠用患人腦後發一根纏定蜘蛛窠將銀簪刺在燈上燒之存性為末吹喉立效各部俱載喉癬頭胎黃牛屎以新瓦洗淨蓋屎周圍用文武火煅煙盡存性取出研末將蘆管徐徐吸入自愈一方冰片牛黃各一分膽礬三分大硼砂八分山豆根二錢雄黃兒茶各八分陳白梅去核三個共研末次將白梅搗爛入藥和勻丸如龍眼大臨臥含口內過夜即消祕方集驗閉塞不通臘月初一日取豬膽不拘大小五六枚用黃連青黛薄荷殭蠶白礬朴硝各五錢裝入膽內青紙包好將地掘一小孔方深一尺以竹橫懸此膽在內以物蓋定候至立春日取出待風吹去膽皮青紙研末蜜收痛吹少許神驗此萬金不傳之方邵真人經驗方百靈丸治喉中結塊不通水食者百草霜蜜和丸芡子大水化一丸灌下甚者不過二丸簡便方吹喉藥硼砂二錢半雄黃三錢兒茶一錢冰片三分薄荷三兩另研極細末共研細末和入薄荷末研勻貯罐不可泄氣用蘆管吹入少許或用茶匙挑入舌上噙一會咽下日八九次若鎖喉風口內乾枯者以井水調灌即能開關生津若脾泄胃弱者不宜多用余無禁忌祕方集驗喉爛槐花三錢牛膝兒茶黃連各一錢共末夏天西瓜水服冬天生梨汁服丸如緑豆大每服三丸祕方録咽喉懸癰舌腫塞痛五倍子殭蠶甘草等分為末以白梅去核搗丸如彈子大噙噬其癰自破外科祕寶咽生息肉先刺出血豆豉同鹽塗之神效單方咽喉諸藥不效丹溪云此非喉症乃是鼻中生一條紅線如發懸一黑泡大如櫻珠懸挂到咽門而止口中飲食不入用土牛膝根獨條肥大者搗碎入好醋三五滴同打細滴入鼻中二三點即系斷珠破吐出瘀血立安赤水玄珠骨硬喉歌縮砂草果威靈仙清水砂糖共配煎接連服下二三碗諸般骨硬化為涎古仙方口疳紅棗十枚燒存性梅花冰片二分吹患處立愈一用縮砂殼煅研擦之即愈一用雞肫黃皮燒灰敷亦立效活幼新書口唇燥裂用橄欖泡湯服核中仁研爛敷患處或胭脂敷立效口破兼治牙疳鵝口口破俱禁水漱滑石一錢辰砂三錢冰片二分研末摻患處集驗方重舌涎出水漿不入玄精石二兩牛黃硃砂龍腦各一分為末以針刺舌上去血鹽湯漱摻末咽津效驗如神聖惠方木舌口舌俱硬有衣不能開薄荷細茶共煎露一夜青絹裹箸上蘸藥徐徐抹上愈祕方録重舌木舌紫舌大人小人皆由心火結成黃連山梔荊芥黃芩連翹木通薄荷各一錢牛蒡一錢甘草五分燈心煎服舌腫滿口單用蒲黃末摻之愈青浦徐氏抄本癭瘤癭多著於肩頂瘤則隨氣凝結此等年數遠侵大侵長堅硬不可移者名曰石癭皮色不變者名曰肉癭筋脈露結者名曰筋癭赤脈交結者名曰血癭隨憂愁消長者名曰氣癭五癭皆不可決破決破則濃血崩潰多致夭枉難治瘤有六種骨瘤脂瘤肉瘤膿瘤血瘤筋瘤亦不可決破決破則亦難治肉瘤尤不可治治則殺人唯脂瘤去其脂粉則愈贅癭焦法甘草煎膏筆妝瘤之四圍上三次乃用芫花大戟甘遂等分為末醋調別以筆妝其中勿近甘草次日縮小又以甘草妝小暈三次如前仍上此自然焦縮危氏得效方腋下癭瘤用長柄茶壺蘆燒灰研末擦之出水消盡而愈瀕湖集驗癭疾萬州黃藥子半斤須除重者如虛輕即是他州出力慢加倍取好酒一斗入藥封瓶口以粳火煨一周時待酒冷時時飲一杯不令絶酒氣三五日後常把鏡自照覺消即停飲勿服其效如神燒酒時聞香氣外出瓶口有津即止火不可太猛千金月令方點癭桑炭灰棗木灰黃荊灰桐殼灰各二升半蕎麥灰炒上以沸湯淋汁五碗許入斑蝥四十個穿山甲五片乳香冰片不拘多少後入煎作二碗以磁器盛之臨用時入新石灰調膏敷干則清水潤之神效赤水玄珠疝氣附便毒凡患疝氣者楊梅不可與燒酒同食食則即時舉發無不解救七疝症各不同治亦有別如寒疝囊冷結硬如石陰莖不舉或控睪丸痛得於坐臥濕地涉水以去濕之劑下之水疝囊腫如水晶陰汗癢搔出黃水或小腹按之作聲得於醉酒行房汗出遇風寒濕結囊中以逐水之劑下之筋疝陰莖腫脹或潰或濃或痛裡急筋縮或莖痛痛極則癢或挺出不收白物如精隨溺出得於房中邪術所使宜降心火之劑下之血疝狀如黃瓜在小腹兩旁橫骨兩端俗名便癰得於重感春夏大燠勞於使內其氣流溢滲入脬囊結為癰腫以和血藥下之氣疝上連腎區下及陰囊或號哭忿怒氣鬱而脹以散氣藥下之狐疝狀如瓦臥則入腹行則出上下無定如狐之惑也故名之以逐氣流經之劑下之㿗疝陰囊腫大如升斗不癢不痛因受濕氣而生宜去濕之劑下之疝氣者疝本肝經宜通勿塞絶與腎經無干或無形無聲或有形如瓜有聲似蛙是疝病也治初濕熱在經郁久後感寒氣外束不得疏散所以作痛不可執作寒論須用寒熱相兼用神效湯加減川烏以散寒氣山梔以清濕熱皆是下焦主藥其效甚速木疝即木腎凡人心火下降則腎水不患其不溫真陽下行則腎水不患其不和溫且和安有所謂木強者哉木強則傷腎矣故不可純用燥藥當行溫和散利以逐其邪則邪自消榮衛流轉則愈宜服枸杞丸枸杞昆布吳茱萸各四兩南星半夏白芷楂肉炒神麯各三兩滑石炒蒼朮鹽炒黃柏酒炒各三兩為末酒和丸如梧子大每服七十丸空心鹽湯下祕方集驗二層茴香丸治一切疝如神㿗疝尤為要藥第一料大茴香拌鹽五錢炒和鹽稱沙參川楝子去核炒木香各一兩上為末水煮米糊為丸梧子大每服二錢空心鹽湯下日三服才完便接第二料照前方加蓽茇一兩檳榔五錢為丸服若未愈服第三料照前二方加白茯苓四兩附子制一兩和丸服但每服三錢雖三十年之久大如栲栳者皆可除根醫宗必讀治疝仙方小茴大茴各一兩末豬尿胞一具入藥扎緊砂罐內酒煮爛連胞搗丸梧子大白湯下五十丸筆峰雜興血疝便毒已未成即時散斑蝥三個去足滑石三錢分三服空心下一服毒從小便出如痛用車前木通澤瀉豬苓煎服東垣方斑白散治便毒斑蝥炒一錢白芷八分為末每服六分空心酒下即時見效一用大蝦蟆一個剝皮連腸搗爛入蔥五根再搗敷卻用皮覆貼其上一方乳香沒藥各錢半薑蠶二錢全蠍洗淨三錢蜈蚣八錢斑蝥去羽足甲皮炒巴豆去油各四錢共末重者酒服一錢輕者六分二次即效廣瘡魚口橫痃土茯苓米泔水洗捶碎忌鐵器白者佳紅者能殺人粉霜以硝皂礬明礬水銀各二錢銀罐合好鹽泥封固放爐內文武火升之一症只用六釐黃米飲為丸切作七服每服或三粒五粒雄黃為衣空心酒下忌房事一切毒物大小便不可令人聞祕方集驗下疳及腎囊風囊癰諸證附橫痃下疳玉莖生瘡謂之下疳爐甘石乳香血竭黃連各一錢輕粉五分冰片一分共末米泔水洗淨抹上立效一用蝸牛焙乾研末枯礬各一錢濕則乾摻干則以香油調塗立愈抄本歷驗神方治疳瘡蛀梗瘡二蠶繭出過蛾者燒灰存性枯礬五分輕粉二錢兒茶一錢五倍子一大個紅絹方圓三寸一塊燒灰共末酸漿水蔥白川椒煎湯洗搽神效無敵一用銀珠水飛一錢輕粉五分兒茶一錢老茶葉三分黃柏灰三分黃蠍二錢溶化入前藥為丸作二十丸好酒空心下其效無比靈祕丹藥下疳陰瘡爐甘石火煅酸淬五次一兩兒茶三錢為末麻油調敷邵真人方腎囊風癢痛有黃水不幹者蚯蚓泥同真粉停對井水調敷干為妙永不再發若癢不可忍用大葉楊柳葉一握煎水乘熱熏洗後以蚯蚓屎焙乾燥研末摻之三四次即愈一用牆頭上醬板豆草或鮮或收干煎湯洗愈繡球花煎洗尤妙姚伯玉方陰球開花狗脊七隻煎湯入罐內將陰球挂罐口離湯一二寸俟熱氣熏上湯將溫時傾盆內洗球如此三日全愈單方集驗囊癰栝蔞五錢甘草節金銀花各五錢連翹柴胡青皮各七分水煎服愈新都醫案囊癰潰後摻藥蚌殼黃連青黛各等分研細敷之祕方集驗橫痃青殼雞蛋一個蒺藜一合好酒煮蛋去殼再煎服立愈長興莫氏傳瘋斑大麻風老蝦蟆一個白砒三錢銅緑二錢人中白二錢研末裝入蟆口內線縫好外以泥包裹火煅煙盡為度取起去泥約有五錢隨輕重配苦參瓦松各一兩神麯打糊為丸如梧子大每服五分滾水或麻黃湯或酒下皆可眉毛先落肝經受病加石決明先損眼目心經受病加梔子面起紫泡肺經受病加葶藶遍身如癬脾經受病加白朮腳底先破穿腎經受病加破故紙五死飲脾死麻木不仁蒼朮湯下血死潰爛生膿生地湯下肉死切割不痛苦參湯下筋死手足婪落續繼湯下腎死腳下有孔薏苡牛膝湯下祕方集驗洗藥每日洗一次桑皮大黃芒硝各一撮水煎無風處洗如有蟲加鴿屎同煎如爛用琥珀末搽患處此方神驗千金不易祕録凌霄散治厲風神效蟬蛻地龍去土焙白殭蠶全蠍各七個凌霄花五錢共末每服二錢酒調下不時沐浴每浴坐湯中浸一時久服藥神效赤水玄珠白癜風詩云白癜紫癜一般風附子硫黃最有功薑汁調勻茄蒂擦但患癢處並無蹤上將粗布擦洗患處令淨以茄蒂蘸藥擦之白癜用白茄紫癜用紫茄醫方纂要紫雲風甘草一兩川烏薑汁炒草烏黑豆炒豆熟去豆用防己各五錢牛膝七錢炒乾羌活上部用獨活下部用川芎白芷馬兜鈴炒各四錢共末每服七分好酒下外用蛇床子夏枯草煎湯洗數次風塊即退集驗方鵝掌風槐皮大麥花椒地骨皮艾葉鴿屎白芷煎湯先熏後洗每日數次愈當用豬蹄湯洗先以滾水洗手浸皮如白浮色石柏枝煅燒為末用滴滷調藥半酒盞如糊搽之愈雄黃同穿山甲火燒熏之數次自愈乃呂祖法也集驗方一用真艾四兩水四碗煮數滾入大口瓶內用麻布二層蓋扎將手心放瓶口熏之如冷再熱再熏無不應效積德堂孫氏方一用鴿子屎水龍骨各一兩北常山一兩五錢為末將桐油搽掌上患處用藥熏之數次即愈一用豬膽一個黃柏八分乳香五錢煎豬油一兩擦之青浦徐方鶴膝風三陰之氣不足風邪乘之兩膝作痛久而膝愈大而腿愈細因名鶴膝風乃敗症也臘糟四兩肥皂去子一斤芒硝五味砂糖各一兩薑汁半碗研勻日日塗之加火酒更妙一用陳艾菊花二味作護膝內久自除患丁氏抄録神效散治鶴風兼治附骨疽皮色不變大腿通腫疼痛無奈及痢後腳痛緩弱不能行或腿膝腫痛等症人參二錢防風白朮附子當歸白芍杜仲黃耆羌活牛膝甘草熟地各一錢薑三片水二碗煎半食前服祕方集驗汗斑密他僧六錢雄黃三錢硫黃三錢先以薑擦斑次用藥末搽之次日即焦永不發抄本一方單用密他僧為末隔年釅醋調搽隨手而愈醫書酒刺蛇床子紅豆等分為末早洗晚搽周氏祕録腳氣足瘡腳氣始受於濕復夾風寒暑熱之邪而成故先起於腿足必腳屈弱而舉動轉筋肢節疼而足胻痛小腹不仁心中悸動胸前便澀但發熱頭痛身疼之候絶似傷寒人多誤治仲景以腳氣類傷寒症另立篇目以別之蓋為此也羅謙甫云南北腳氣受病不同南方卑濕濕每襲虛而病起於下此腳氣從外受也北方地高無濕共俗飲潼乳酒面以飲多快食為能或奉養太過亦滋其濕水性潤下氣不能拘故下注於足而成腫痛此腳氣從內受也當推究所因而治之腳氣上攻結成腫核及一切腫毒甘遂末水調敷甘草汁服即消百一選方濕腳氣足痛脛腫須服防己飲白朮炒犀角蒼朮炒生地酒炒黃柏酒炒木通防己檳榔川芎各八分甘草梢七分水煎熱服有熱加黃芩熱甚及天令熱加石膏痰加竹瀝薑汁或南星便祕加桃仁小便澀加牛膝祕方集驗腿轉筋上衝入腹速用木瓜吳茱萸各一錢食鹽五分水二盞煎半服即愈若不急治痛衝心上則不救矣願體集蒼朮散治一切風寒濕熱足膝腰臀髀一切疼痛及腳氣百發百中蒼朮米泔水浸一日夜鹽炒黃柏去粗皮酒浸一日夜炙焦各五錢作一服用水二鍾煎半食前服日二三服醫方選要腳痛膝痛不能舉步者山楂肉白蒺藜各等分兩蒸兩曬為末蜜丸如梧桐子大每服三錢用白湯下或一斤或二斤無不愈者周氏抄録腳墊痛人走長路緊急被石塊腳底墊腫不能行步痛不可忍急用舊草鞋浸尿桶內一夜將新磚燒紅以浸濕草鞋放磚上隨以腫腳踏上火逼尿氣入內即消若不早治恐潰爛難愈如走長路腳腫痛亦用此法即消懷德堂祕録一粒金治風寒暑濕不問遠近一切走注疼痛難忍白膠香另研草烏去皮臍五靈脂地龍去土木鱉捶去油各一兩五錢乳香沒藥當歸各七錢半麝香二錢二分京墨燒煙盡一錢二分糯米粉和丸芡實大臨發時空心酒化服一丸趕到腳面上赤腫不散再一丸趕到腳心出黑汗乃除根如病在上食後臨臥酒下自然汗出及中風癱瘓麻痹不仁手足不遂偏枯酒下二丸日三進初中風不省研一丸酒調灌下一醒足熱萬病回春足患治濕氣兩腿作痛艾葉二兩蔥頭一把搗爛生薑一兩五錢亦要搗爛用布共為一包蘸極熱燒酒擦患痛止為度祕方抄録腳心腫痛因久行久立所致蚯蚓屎水和敷一夕即愈單方風癢足瘡遠近流黃水者黃柏去皮不拘多少用豬膽汁塗搽曬乾數次酥透柏皮方研末先用花椒煎湯洗過隨以末藥敷之二三次即愈祕方集驗腳趾縫爛瘡鵝掌黃皮焙乾燒灰存性為末搽或因暑抓爛瘡細茶嚼爛敷之單方兩足血風痛馬齒莧焙乾淨末五錢黃丹飛黃柏兒茶枯礬各三錢輕粉一錢共末生桐油調攤紙上先用蔥椒湯洗淨貼之效單方集驗爛腿瘡乳香百草霜窯煤各三分沒藥分半血竭龍骨輕粉各一分生芝麻一撮生雞子調做隔紙膏貼懷德堂方裙帶瘡嫩長桑根皮用不落水豬油搗敷干即換數個愈心鏡傳一用梨葉百片豬油二兩將葉在鍋內炒拌次下上好白蠟二兩亦搗爛拌在內令化在藥上又下鹽一兩亦拌在內燒用微火不可使藥炒爛取起待冷貼上神效單方全集裙風瘡爐甘石醋煅研細麻油日日調敷立愈歷驗仙方肉刺雞眼萆麻子為細末敷上一二時其刺自出痛即止祕方集驗雞眼生蜈蚣一條搗爛少許貼上片時拔根抄本腳鹼荸薺半個貼患處過夜次晚再貼五六夜其鹼連根脫出一用蔥根荸薺搗汁一碗煎再取松香四兩麻油再煎滴水成珠方入前汁攤膏藥貼即落一方蜈蚣一條硼砂等分放鍾內拌埋地七日取出銀簪點上即脫單方祕録驢眼瘡生腳脛骨周圍如臁瘡樣田螺去殼搗爛敷數次即愈單方集驗腳折裂破凡冬月患此行步疼痛用湯洗淨拭乾將黃蠟一兩溶化入松香末三分用少許安刀頭上溶化滴入折中即愈神效赤水玄珠甲疽延爛緑礬五兩燒至汁盡研末色如黃丹收之每以鹽湯洗拭用末厚敷以軟帛絞裹當日即汗斷瘡干每日一遍鹽湯洗淨其痂干處不須進洗後或作白膿即擦破敷之自瘥外臺祕要嵌甲入肉礬石燒灰敷餌惡肉生好肉細細割取甲角愈肘後方末藥方治腳上一切亂瘡珍珠琥珀各一錢輕粉黃丹乳香去油沒藥石膏各一錢沿牛殼四錢共末敷抄本解諸毒附吞銅鐵中毒覺腹中不快即以生豆腐試之入口不聞腥氣此中毒也急以升麻煎濃連飲以手摳吐即愈各部俱載蠱毒先取炙甘草一寸嚼之咽沫若中毒即吐出仍以炙甘草三兩生薑四兩水六升煮二升日三服若含甘草而不吐者非毒也微今鐸蠱毒昔李熹為雷州推官得治蠱方毒在上用升麻吐之毒在腹用鬱金下之或合二味服之不吐則瀉活人甚多範石湖文集解相反藥毒蠶退紙即出過蠶之紙燒灰細研一錢冷水調下頻服效解百藥毒服藥過多生出毒病頭腫如斗唇流血或心口飽悶或臍腹撮痛者黑小豆即馬料豆緑豆各半升煮汁服並食豆寬愈附子川烏天雄斑蝥毒單以馬料豆煎汁服皂礬毒急取麵糊一鉢服之單方總集砒霜毒緑豆粉細篩四兩黃泥篩四兩生雞清九個共一處以浸豆水和服即解若有黑羊血再吞更妙凡服砒人不可仰臥恐毒流四肢難治愈後煙酒薑椒煎炒須忌百日願體集解信毒速取梁上燕子窠用井水三四大碗放水桶內將手多攪調之用夏布手巾如柞腐法篩去泥葉取所攪之水連灌二三碗自吐不吐再灌吐盡方醒單方斷腸草毒雞抱卵劈開以清油調勻灌之或服生雞蛋三四枚或服熱羊血碗許總宜吐盡方醒願體集鉛粉毒婦人打胎服之不惟不效每至欲死不能求生不得且生子多癡呆身體發瘡毒有誤服者急搗蘿蔔汁飲之祕方集驗開口椒毒吐白沫身冷欲絶者地漿水飲之即解金匱方野菌毒飲地漿水三四碗地漿能解百毒真神方也單方全集牛肉毒烏柏樹根皮酒煎同熱酒服或菊花連根搗汁酒服同上犬馬肉毒杏仁去皮粒四兩碎以百沸湯和仁絞汁作二三服吃或急吃冷粥一碗頃刻毒解思食單方全集菌子並河豚毒多服金汁即解如難得於地上挖一潭用水和泥稍定服水一二碗即解或服紫金錠更妙錢氏抄方燒酒毒火燒悶絶或受煙煤毒用白蘿蔔汁或熱尿灌俱效願體集誤食螞蝗嗜芹菜者多此疾空心食地漿水少許即下同上蟹毒藉汁蒜汁冬瓜汁黑豆汁及紫蘇汁俱可解同上食毒鱉飲藍汁數碗或藍錠清水亦可自死六畜毒黃柏搗末水調一錢或壁上黃土二錢水調服或飲人乳一碗單方全集黃鱔魚毒食此犯荊芥能害人服地漿解之集簡方白果毒麝香一分煎湯服豆腐毒蘿蔔湯飲之即解本草煤炭毒一時暈倒不救殺人急以新汲清水灌之言瑤方鹽滷毒用生豆腐漿灌下再以鵝翎攪喉數次令吐即活古方馬犬河豚諸魚蟹毒心下堅硬或腹脹口渴忽發熱妄語蘆根煮汁服梅師方誤食桐油令人發吐不止急飲熱酒即解祕方集驗吞銅錢羊脛灰煮粥食之神效本草吞針蝦蟆眼一隻木通湯吞下其針即穿於眼內從大便而出小兒吞針將半生半熟出芽蠶豆搗爛用韭汁為丸吞下祕方五絶急症人遇暴症急如風雨延醫不及無不束手待斃若口中有氣心頭尚溫者急宜按方速治免諸橫妖功莫大焉五絶皆用半夏研細末冷水和丸如小豆大塞鼻中並燥末吹耳內心溫者死一日猶可活此扁鵲法奈人不曉因氣絶多不救惜哉又急於人中穴及兩足大趾甲離甲一韭菜葉各灸三五壯即活感應篇後集救自刎法自刎之人斷食嗓者可治斷氣嗓者難治若食嗓氣嗓俱斷更難治全要知覺早急將頭扶住乘其氣未絶額未冷用絲線縫合刀口據方書用桃花散用石灰二升大黃四兩切片同炒候灰桃紅色去大黃將灰細篩收貯瓶內過月餘去火氣然後可以應用故此藥必須預先備之降香末松香末搽沾奈一時難得迅速之際延醫不及急將活雞一二隻扯下熱雞皮冷則無用將線縫刀口周圍纏護用軟絹帛並棉花扎之外將女人舊布裹腳周圍再纏五六轉勿使泄氣其中自然合一令患者仰臥以高枕枕腦後使頭鬱而不直刀口不開冬夏避風衣被蓋暖若氣從口鼻通出方用白米一合入人參一錢薑三片同煎粥湯飲之接補元氣再延名醫調治可也願體集鬼魘灶心土碎打井水調二錢更挑半指甲許吹入鼻中如不醒用艾灸人中穴並兩足大趾甲離甲一韭葉各七壯祕方集驗凍死凡凍將死者以灰燒暖盛囊中尉心頭冷即易熱灰若不先溫其心便以火烘則冷與火爭必死感應篇載渴死用路上熱土大蒜勻研爛水調去渣飲之古方癲癇狂亂附鬼祟驚氣丸發則牙關緊閉涎潮昏塞醒則精神若癡附子木香殭蠶白花蛇桔紅天麻麻黃乾蠍南星薑汁浸一夜各三錢蘇子一兩硃砂錢半為衣加冰片少許蜜丸如龍眼大每服一丸金銀薄荷湯下一呆犯臨刑得釋驚癡一丸而愈一婦癡十年去附子加鐵落亦愈許學士方遂心丹治癇症甘遂末三錢用豬心取三管血和藥入內縛定紙裹煨熟取沫入辰砂末一錢分四丸豬心煎湯調下大便下惡物為效不下再服濟生方經驗方鬱金七兩明礬三兩為末糊丸每服十丸一婦癲狂十年服此初覺有物胸中脫去神氣灑然再服全愈李時珍制歸神丹豬心二個切入硃砂二兩燈芯三兩在內麻扎石器煮一伏時取砂為末同茯神末三兩酒打丸梧子大每服九丸漸至二十五丸麥冬湯下甚者乳香人參湯下百一選方癲狂先將病人綁伏當心下來三指灸七艾或九艾再灸兩太陽六七艾次用辰砂三錢川貝三錢酒服二次再用海風藤錢半鳳尾草錢半石菖蒲三錢川貝錢半服五六貼或再服紫金錠一二錢愈後用蘆蒂棗肉為丸每服三分服至三丸全愈遵此治法百試百驗衛生備要治狂不眠人參棗仁各一兩辰砂五錢乳香一錢五分蜜丸彈子大薄荷湯下一人緣兵火失心服二十丸而愈神效赤水玄珠夜夢亡鬼人參黃耆枸杞苡仁白朮各錢半當歸遠志茯苓木瓜陳皮各一錢甘草五分水一鍾入豬心血一枚煎八分飲四五貼自愈新都治集久癇用不落水豬心一個去內心血入射干三錢泥封固煨待紅取出存性研末每服三錢百試百驗祕方總集中諸鬼祟人為鬼附昏迷笑哭或作鬼語急將兩手大指縛作一排用艾圓嵌中間爪中盡頭連肉處灸七壯或十七壯鬼即去若猶昏沉者用麻黃三兩杏仁七十粒甘草一兩水二碗煎半灌之愈後仍服參耆等補正之藥祕方集驗尸厥由入廟弔喪問病而得者用附子七錢重者泡去皮臍為末分二服每服酒三盞煎一盞如無附子生薑汁半盞一盞同煎百沸連灌二服即醒卒厥無論中風寒暑熱鬼祟邪氣食痰生薑汁一鍾童便一鍾調服立知人事單方中惡心痛殺白烏骨雞敷心即瘥鬼擊用血塗亦效李時珍方鬼箭打鐵屑細淨二兩胡桃一斤淨肉桃仁八兩同入磁器內加好酒四斤隔湯煮以糯米置上熟為度每日不拘時隨量暖服蓋被髮汗服時痛稍甚服完漸愈勿以服藥時痛而中止也一用炒山梔面炒桃頭七個杵餅貼次日作七丸投炭火中燒響即愈單方全集神箭狗骨燒灰三錢山梔七個面飛糟各一兩醋調敷不可針刺女人病邪女人與邪交通獨言獨笑悲思恍惚者雄黃一兩松脂一兩溶化以虎爪攪之丸如彈子大夜燒籠中令女坐上被蓋露頭在外不過三劑自斷仍以雄黃人參防風五味子等份為末每旦井水服方寸匕肘後方腫毒經曰凡瘡之痛癢自屬虛實寒熱故痛而實者為熱虛而癢者為寒然諸瘡痛癢皆生於心以心主血而行氣氣血凝滯而為癰疽瘡癤闊大一寸以上曰癰疽一寸以下為瘡癤諸瘡之中惟背疽疔瘡最為急症其初發也使身體或先熱而後惡寒或先癢而後疼痛若其不痛最為惡症且如背疽始生如粟黍粒大才有覺時便用艾於痛處灸之痛則灸至癢癢則灸至痛使毒氣隨火而散凡毒初起皆可灸惟頭頂以上屬陽明斷不宜灸若失之於初瘡勢已成又當審其虛實寒熱熱實則清之虛寒則溫之得毒消膿潰方為可治之症癰疽背毒歌訣真人妙訣世間稀一切癰疽皆可醫化血就如湯潑雪消膿立效肉生肌任他發背臁瘡毒那看疔瘡瘰癧兒假饒疥癩並風癬乳香五背盡消除甘草節金銀花在四肢加倍防風沒藥赤芍白芷在腹膜加倍陳皮各三錢當歸一錢五分乳香沉香貝母各一錢木香八分角刺五錢銼碎定粉八錢同炒黃去粉甲片五錢蛤粉炒黃去粉上乳香沒藥甲片另研其餘分作四貼每水二鍾煎七分加好酒半鍾沖服前末俱調於藥內同服上部飽服下部空心服古方癰疽發背凡中熱毒眼花頭暈口乾背熱四肢麻木有紅暈在背後者槐花子一大把鐵鍋炒褐色好酒一盞服之乘熱飲一汗而愈如未退再服極效彭辛庵用此方三十年無不見效保壽堂方背毒未成者用活蟾一個系放瘡上半日必昏憒置水中救其命再易一個必踉蹌再易其蟾如舊則毒散矣纍試極效勿輕視醫林集效凡患癰疽瘡毒者用土中大蝦蟆一個剝全身癩皮蓋貼瘡口於蟆皮上用針將皮刺數孔以出毒氣自覺安靜且能爬住瘡口不令長大又可免蜈蚣聞氣來侵神效神妙靈祕丹藥癰疽初起乾薑一兩泡炒紫色研末醋調敷四圍留頭愈申一齋方凡毒初起及經十日以上腫熱疼痛用雞子一枚新狗糞如蛋大攪勻微火熬令稀調得所捻作餅子於腫頭上貼之以帛包抹時時看視覺餅熱即易勿令輕動及歇氣經一宿定如日多者三日貼之一日一易至瘥乃已一切諸方皆不及也抄本護心散凡癰疽三日內宜連進十服方免變症使毒氣外出稍遲內攻漸生嘔吐或鼻生瘡菌不食則危矣五日後亦宜服真緑豆粉一兩乳香五錢燈心灰同研和以生甘草濃煎調下一錢時時呷之若毒氣衝心有嘔吐之症大宜服此蓋緑豆厭熱下氣消腫解毒乳香消諸癰腫毒服至一兩則香徹瘡孔中真聖藥也李嗣立外科方忍冬濟急酒金銀花藤五兩木槌捶碎勿犯鐵器生甘草節一兩水二碗煎半又入陳酒一大碗再煎數十沸去渣分作三服一晝夜吃完外即用金銀花葉入砂盆內研爛加酒少許打稀爛調塗四圍中留一孔泄氣凶者一日二服大小腸通利則藥力到神效無比陰隲文刻板鐵箍散一切腫毒初起圍之即消已成圍之毒氣不至攻走無膿圍之有膿未潰即潰已潰濃即追出九月九日取芙蓉葉陰乾五錢薑黃白蘞白芨五倍子各五錢大黃一兩蟹殼五個陳小粉炒一兩研末醋調圍醫方解諸毒凡患發背對口一切無名腫毒及久近臁瘡先看所患腫處用生面水調作圈依腫處大小圍之圈高寸余實貼皮上勿令滲泄圈外密施布巾數重防火氣侵餘地患者安身勿動圈內鋪極好黃蠟片屑上以炭火灸至黃蠟溶化毒淺者皮上覺熱痛不受灸便止毒深者全不覺熱痛再下蠟隨化隨添至圈滿仍前熱火灸至蠟沸初覺癢後覺痛久之不可忍乃去火以少水微澆滾蠟上俟冷揭去蠟近皮者俱帶青黑色此毒隨蠟拔去淺者一二灸便內消深者三四灸亦膿去腫消立愈灸畢外貼生肌玉紅膏此百治百驗者祕方集驗腫毒及指上癰腫神效獨郎大蒜一顆百合數葉臘糟敷上衛生備要身上諸毒癧串久不收口者亦效獨郎大蒜一枚加雄黃不拘多少共搗成餅貼之將艾放餅上灸一壯即愈祕方纂要定疼散山藥一兩白糖霜大黃各四錢打爛敷上即止疼或搭手發背破爛者只用糖霜山藥打爛塞入毒內不臭爛肉去新肉自生初時日換二次三日後一日換一次煎甘草湯或豬蹄湯洗用軟鵝毛數根扎之洗去再敷待肉長滿方止單方全集透膿散治諸瘡毒貼骨癰疽不破者不用刀針一服即穿透願繭蛾一個燒灰酒調服即透切不可服二個若服二則有二口慎之此方神效外科發揮腮毒大黃末薑汁和勻周圍搽轉只露一頭不日愈搭手全蠍核桃共研細酒沖服一二次即消單方集驗干發背生甘草炙甘草各五錢角刺二錢半土炒土貝五錢半夏錢半甲片二錢半炒黑知母二錢五分加薑蔥水酒煎二劑即愈呂晚村方疔瘡附金瘡癰疽宜灸疔毒宜針明疔易治暗疔難療生於口耳目鼻者顯而易見生於身體四肢者隱而難防及至發作誤認傷寒半日不治毒必走黃入心人即昏憒若早知覺急用針或磁峰刺入二三分擠去惡血當摻立馬回疔丹於針孔內恐丹一時難覓可用蝸牛連殼搗爛敷之或家菊花根搗敷內服梅花點舌丹或蟾酥丸一二服俱用菊根汁和熱酒下出汗即愈屢見染此症者多畏疼痛不肯針刺殊不知一染疔毒皮肉即僵針亦不覺痛須用膽速針慎勿遲延而誤時刻也凡手足間生黃泡或紫黑色有一條如紅線急宜以針於紅線所至之盡處刺出毒血不刺則毒入腸胃不救惟刀鐮疔忌刺狀闊狹如韭菜長一寸左側肉黑如燒烙刺後用益母草葉熏燒灰敷之方用明礬末三錢蔥白七根搗爛分作七塊每塊熱酒一杯送下以衣被蓋之如無汗再服蔥白湯一鍾少頃汗出從容減去衣被其病若脫忌風寒房事酒肉魚腥蒜椒辛辣油膩生冷等物單方集驗疔毒已篤者二服即愈土蜂房一具蛇蛻一條黃泥固濟燒存性為末每空心好酒服一錢少刻大痛痛止其瘡已化為黃水潘霞山祕録追疔奪命丹羌活獨活青皮甘草節黃連赤芍細辛蟬蛻殭蠶金絲重樓防風澤蘭金銀花各等分有膿加何首烏白芷要通利加青木香大黃梔子牽牛毒在下加木瓜各等分每服五錢先將一貼加澤蘭銀花各一兩薑十片煎至半熱服汗出為度病退再加大黃二錢煎熱取利一二次去餘毒為妙此方取效如神百發百中若心煩嘔吐加甘草節一錢緑豆粉一錢酸漿下嘔逆噁心加乳香緑豆粉甘草湯下赤水玄珠蟾酥乳香膏蟾酥酒化硇砂白丁香輕粉各一錢蜈蚣炙一條硃砂二錢乳香六分麝香一分金頂砒五分製法川鉛一斤小罐內炭火煨化投白砒二兩干化煬鉛上煙盡為度取起候冷打開金頂砒結在鉛面上取下聽用共為末糊成麥子大凡遇疔瘡針破用一粒插入孔內以膏藥蓋之追出疔毒為效祕方集驗小奪命散治疔瘡及腦疽惡毒其效如神槐花子蒂丁千頭子即掃帚子各等分水煎通口溫服加蟾酥少許尤妙萬病回春爛頭疔白菊花根一把白梅二個蜒蚰大者二條共搗爛加透明雄黃同敷如干再另敷易一二遍無不愈者屢驗方扎馬疔切不可食肉生白酒煎豨蘞草紫花地丁車前草服之愈祕方集驗金瘡急用自己小便淋患處口必渴切不可飲水但食肥膩之物解渴而已若食薄粥則血沸而出必死單方集驗一方五月五日將老鼠同石灰搗收敷金瘡神效李時珍方金瘡出血龍骨煅二錢白礬半生半枯一兩五倍子半生半焙二兩乳香沒藥各三錢無名異一兩為末乾摻不作膿不怕風立時止血住痛生肌如神採醫書一用五倍子降真香等分炒末敷之皮肉自痊懷德堂録跌撲損傷瘀血衝心從高墜下欲死倉卒取藥不及擘開口以熱小便灌之或卒墜壓倒打死將本人如僧打坐令一人將頭髮放低用半夏末吹入鼻中醒後以生薑汁真麻油攪勻灌之再以乾荷葉燒灰熱小便調下三錢日進三服自愈附刊感應篇注證八釐散土鰵一錢焙末乳香沒藥血竭各一錢大半夏生用當歸酒浸巴霜砂仁雄黃香甜瓜子各五分為末收貯聽用每服八釐好酒下小兒三釐但能開口服下即得活矣八仙歌訣此方八仙傳授千金世上難尋止疼止痛如神接骨續筋立應不問外感為最哪管內損伶仃八釐一服保安寧須臾便得活命江湖上方姓授上部損傷如頭破見髓或傷風於內羌活防風半夏升麻當歸芍藥陳皮生地甘草川芎白芷茯苓南星花粉蔓荊薑三片外加血餘炭一錢落得打一錢二味俱為末吞服中部損傷如手摺之類羌活防風當歸赤芍陳皮白芷甘草秦艽黃耆茯苓生地官桂故紙花粉外加五加皮血餘炭各一錢前法服下部損傷如腿足傷當歸芍藥陳皮牛膝木瓜防己川芎茯苓羌活白芷白朮秦艽生地甘草外加血餘炭一錢如前法服醫方集效尉法用生蔥連根切碎炒令汁干乘熱敷患處外用絹帛束之立刻定痛止血萬病回春筋骨折傷急取雄雞一隻刺血量患人酒量沖服痛立止神效無比赤水玄珠奪命散治撲打金刀傷及破傷風傷濕發痛強直如癇狀者天南星防風等分為末水調敷患處出水為妙仍以溫酒調服一錢已死心尚溫者熱童便灌調二錢鬥毆內傷墜壓者酒和服童便連灌三服即蘇亦可煎服三因方腦破骨折蜜和蔥白搗勻厚敷立效祕方集驗跌壓瘀血積痛難忍當歸尾五錢桃仁去皮尖草一粒大黃酒煎一兩酒煎雞鳴時服至明取下瘀血即愈祕方集驗跌打損傷神效方九世還魂草鹿含草落得打草麻皮頭上部倍加土鱉各等分下部加苧根內傷加白頭蚯蚓五味為君隨便再加紅花蘇木等藥酒水煎服汗發而愈有一泥工沈姓者屋上跌下服此三日全愈懷德堂筆記接骨不知痛骨節損傷脫臼接骨者用鳳仙花根酒磨服半寸最多一寸然後揉托而上則不知痛但多服傷人以一寸為極祕方集驗跌打骨折用金櫻子兜即系金櫻子根也去皮煎酒熱服渣敷患處立愈願濟堂刊施墜車落馬筋骨痛不止元胡索末酒服二錢日進二次即愈祕方集驗破傷風皮肉損破覆被外風襲入經絡漸傳入里其患寒熱交作口噤咬牙角弓反張口吐涎沫入陰則身涼自汗傷處反平陷如故者其毒即內收當用萬靈丹發汗令風邪外出次以玉真散患上貼之得膿為效如汗後前症不退傷處不高漸醒漸昏時發時止口噤不開語多不出者終為死候萬靈丹茅朮八兩全蠍石斛明天麻當歸甘草炙川芎荊芥北細辛防風麻黃川烏湯泡去皮草烏同上何首烏各一兩雄黃六錢為末蜜丸或一兩作四丸或一兩作六丸或一兩作九丸三等做下以備老壯緩急取用外以硃砂為衣罐器收貯每用蔥白九枚煎湯化一丸通口服蓋被出汗愈如服後汗遲再用蔥湯催之汗必如淋少頃漸去蓋被其汗自斂一切腫毒風氣宜發散者皆可服如病無表症相兼不必發散者只用熱酒化服避風宜食稀粥忌冷物房事孕婦勿服見醫書玉真散南星防風白芷天麻羌活白附子等分研末敷患處如打傷欲死心頭微溫者熱酒童便灌下二錢連進二服立可回生破傷風牙關緊閉腰背反張甚則咬牙縮舌以童便調服三錢立愈祕方集驗一用蠐螬即地蠶蟲也將駝脊皆握住待口吐水就取抹瘡上覺身麻汗出無不活者昔一兒額上跌破成風依此治之即時愈嬰童百問一切損傷燙火傷最忌浸冷水中防火毒攻心並勿服寒冷之藥但用好酒洗拔其熱毒或服玄妙飲川連花粉元參各二錢陳皮桔梗山梔仁各一錢五分淡竹葉三十片水煎服如藥不便服童便以護其心使心火不能內攻隨取大黃末桐油調敷即垂危者皆保無恙醫方俱載一用豬毛煅存性研末加輕粉白硼砂各少許麻油調敷絶無疤痕祕方集驗遍身燒爛或服蘿蔔汁或服童便後隨取好酒一二甕入浴缸內令患者浸酒中極重不死單方全集諸傷刀割斧砍夾剪槍箭一切損傷生半夏研細帶血敷上立止痛能收口生肌抄本刀傷切不可見水用圖書石滑石末摻之或用刀刮青石末摻之或大黃炒黑篩末摻之或韭菜汁拌陳石灰陰乾摻之或用堅實細炭並老松香各等分研篩細末以韭菜汁拌陰乾再篩細末摻之如急用不用韭汁亦可單方總録金創出血蔥白連根葉煨熟搗爛敷之冷即易而愈本草發明箭傷陳臘肉去皮骨搗爛入象牙人指甲各二錢末極細拌肉內厚敷周圍即如鋭子打入肉以銀灌入傷處其鉛即化仍從傷處隨水銀出神效仙方拔出箭頭花蕊石形如硫黃有白斑黑點火煅七次研末敷四周箭頭自出一用巴豆仁略熬與蜣螂同研塗之須臾痛定微癢忍之待極癢不可忍便搖動拔出速以生肌玉紅膏敷之祕方集驗人咬傷用熱尿洗去牙黃瘀血以蟬酥丸塗孔中或嚼生白果塗之如痛用麻油紙燃火焰熏之用干屎裝荔枝殼內加艾圍灸之以不痛為度單方咬傷指痛不可忍久則爛脫手指並手掌諸方書所不載急用人尿入瓶將指浸之一夕即愈如爛寸蛇烏龜殼灰敷赤水玄珠踢傷或手足或而及擦壞皮肉冬青葉同醋煮數沸略滴麻油少許在內取葉換貼自好單方祕録杖傷久爛中有四五分深潭不能收口用此方摻之數日愈血竭一錢朱丹輕粉各二錢白占錢共末摻上一日夜其肉四圍生起兩日即平出門祕方杖後即飲童便一碗以免血攻心再用熱豆腐鋪在杖傷處其氣如蒸其腐即紫復易之令紫色散盡轉淡紅色為度若杖瘡腫痛雄黃二分密陀僧一分研水調敷極妙凡杖後日服白芨末米飲下神效俱出祕方夾棍傷一出衙門即用熱童便一盆將手足浸之如便冷燒紅磚二塊淬之即熱直浸至童便面上浮起白油其傷盡出矣不疫不再用肥皂搗如泥入雞子清和勻罨患處以草紙包裹腳縛緊一夜不可動即效內服末藥人中白煅一兩乳香箬炙二錢沒藥同上牛膝三錢為末木耳燒灰存性五錢自然銅煅五錢再用牛膝煎酒調服三五錢如無末藥用歸尾川芎乳香獨活壁蝨胡麻骨碎補紅花五加皮各一錢生白酒一壺煎數沸從量飲避風寒厚蓋出汗立愈如骨傷加土鱉一枚集驗方諸癰肺癰之候口乾喘滿咽燥而渴甚則四肢浮腫咳嗽膿血或腥臭濁味胸中隱隱而微痛者肺癰也大凡肺癰當咳嗽短氣胸滿時垂膿血久久如梗米粥者難治若嘔膿而不止者亦不可治也其嘔而膿自止者自愈其面色當白而反赤者此火剋金不可治也第一次服四劑苡仁條芩苦絲瓜甘草各一錢赤芍貝母桔梗栝蔞廣皮升麻丹皮各錢二分黑棗二個薑一片食後煎服如大便不通加麻仁第二次服四劑赤芍貝母花粉甘草栝蔞桔梗知母百合獨活杏仁連翹各等分燈心十根白果肉七個食後煎服第三次服四劑貝母獨活百合甘草桔梗麥冬赤芍知母花粉栝蔞各等分燈心白果照前服以後白鯗紅蘿蔔鴨蛋終身不可食食則後發不治大葷一年後方可吃如齋更妙一方緑橘葉洗淨搗絞汁一盞服之吐出膿血即痊單方全集屢驗方治肺癰未成即散已成即潰已潰即愈神效桔梗一錢苡仁五錢貝母一錢六分黃耆炒一錢金銀花一錢甘草節一錢二分陳皮一錢二分白芨一錢甜葶藶炒八分水二鍾煎半加生薑一片食後徐徐服初起加防風一錢去黃耆潰後加人參一錢久不斂加槿樹皮一錢服李士林新定方腸癰小腹堅硬如掌而熱按之則痛肉色如故或焮赤微腫小便頻數汗出憎寒脈緊實而有力服此神效大黃炒朴硝各一錢丹皮白芥子桃仁各二錢空心煎用祕方集驗肚癰大小腸癰冬瓜癰白芷二錢乳香沒藥各一錢歸尾一錢五分大黃二錢番鱉二枚去毛緑豆二錢為末每服二錢酒下以平為度抄本脅癰金銀花五錢川貝二錢角刺連翹各錢半甲片赤芍各三錢白芷一錢五分地榆五錢甘草節一錢當歸二錢夏枯草一兩煎汁和藥後煎鼠黏子錢半紫花地丁一兩生菊花根一兩搗汁和藥服醫書懸癰在肛門前陰根後兩相交界處初起如松子大漸如蓮子細數十日後如桃李樣宜急治之甘草梢四兩水煎服即愈外用大黃三錢熟石膏一兩紫金錠一錠同搗碎調服一用大粉草四兩長流水浸透炭火炙乾再浸再炙三次切片同歸身三兩水三碗慢火煎去渣再煎稠厚為度每用三錢好酒一杯化膏空心服未成即消已成即潰潰即收口單方全集跨馬癰成膿者極妙黃耆三錢人參二錢川芎當歸各一錢白芷官桂甘草防風各五分一貼痛止再服內潰十貼肉生新都治驗翳癰五爪龍連根搗汁酒摝服日進四五次膿從大便出未成膿者內消如有頭以渣敷上立散單方全集天蛇頭蜈蚣一條雄黃三錢二味共研作細末用雞子清調搽即愈一用豬苦膽入雄黃末五分蜈蚣末五分套指上扎緊愈單方全集流注濕痰流注初起腫痛無頭皮色不變久而不治則發熱作膿知覺早者於未破時急服此方十餘劑即能內治最稱靈驗土茯苓磁鋒刮去皮木槌打碎四兩真膽星二錢川貝殭蠶炒純銀花槐花炒五倍子各三錢桔紅秦艽防風各一錢防己八分木通一錢白甘遂刮去皮末七分皂角子鮮者敲碎九個肥皂子鮮者敲碎十個虛弱人加石斛苡仁各一錢痰在頭頂胸者加夏枯草一錢痰在背脊者加羌活五分痰在脅肋者加柴胡五分痰在肚腹者加赤芍二錢澤瀉一錢痰在臂者加獨活五分痰在腿腳者加木瓜二錢牛膝一錢五分用河水九碗砂鍋內煎三碗每日早中晚各熱服一碗如痰在心之上者食後服痰在心之下者食前服如虛弱者分二劑極虛者分三劑小兒分四劑忌食鹽醬茶醋豬肉鮮魚雞鵝鴨一切發物炒煎薑椒煙酒生冷但藥內有甘遂與甘草相反恐別樣丸散內有甘草者切不可服已破頭者只服四五劑使氣血調治不致流他處隨服十全大補湯加川貝二錢五分石斛二錢滴乳香煅過四分須服數十劑方能全愈若系多火之人十全湯內減去肉桂願體集治流注石膏一兩官硼三錢飛面作十丸穿一孔貫以鐵線炭火燒紅取酒一碗投入冷又燒紅入酒內以丸盡為度其酒熱即服一日二服自消抄本一用地榆苦參各二兩紅花金銀花各三錢酒水各半盞煎服近者三劑遠者七劑即消單方全集楊梅瘡毒通仙五寶散鍾乳粉三分琥珀冰片各半分大丹砂二分為末入炒飛面分半分二十股每日用土茯苓一斤水煎十二碗清晨一碗入藥一股溫服其茯苓湯須一日服盡不可別飲湯水並茶重者再服一料無不愈者忌雞鵝牛羊房事此方古今第一王範泉傳初熏辰砂末一錢棉紙分作七條香油浸透每日熏二條熏時板登坐著暑天用單被寒天用夾被蓋之不可出氣要口含水恐傷口皮熏完吐出不可吞下其效如神祕本搜風解毒湯治梅瘡不犯輕粉重者月餘輕者半月愈土茯苓一兩米仁銀花防風木瓜鮮皮各五分皂莢子四分氣虛加人參七分血虛加歸身七分水煎日三服忌茶並毒物房事此祕方也潘霞山祕録西聖復煎丸已破危篤百方不效用此如神乳香沒藥兒茶丁香焙各一兩阿魏血竭花蛇各四兩末白麵一斤炒蜜六兩香油四兩棗肉為末搗丸彈子大每一丸土茯苓四兩煎湯化服效扶溝竇林僧傳五寶霜治梅瘡並癰疽惡瘡水銀一兩硃砂雄黃各二錢半白礬緑礬各二兩半研勻罐盛燈盞蓋定鹽泥固濟文武火煉升罐口掃收每以三錢入乳香五分沒藥五分酒太乙膏貼之絶效採醫方楊梅結毒皂莢當歸鮮皮五加皮金銀花各二兩作八貼每貼加土茯苓四兩立效懷德堂祕録結毒久爛土茯苓一斤生薑四兩共煎數碗服之不十日而愈其潰處以面汁調麵糊之漸愈曾有陽物爛完半年不愈服此得生祕方集驗癧瘡內消散治癧核不拘近久已破未破花粉苦參各五錢角刺四十九個土茯苓三斤共煎湯當茶飲忌牛肉屢試屢驗奇異方也中書方治癧簡易方枇杷葉一斤四兩去毛淨焙燥為末水白糖一斤拌勻不拘時服白湯過口服完即愈一用活鯽魚一個生山藥一段二味一樣長短白糖三錢搗敷神驗無比二方楊州傳來神效散未破用此而消已潰爛牽至兩間胸腋茄子大四五年不愈者亦治其效如神沉香五錢芫花三錢炒月季花即月月紅用二錢碎銼入大鯉魚腹內魚須放尿內遊死者就以魚腸封固酒水各一碗煮熟服之即愈談野翁試驗方初起神效方甲片土炒丁香白丁香苦丁香紅小豆磨刀泥殭蠶去頭足酒炒各一錢斑蝥去頭足酒炒一錢上為末每服一錢五更時無根水調服至未時打下毒物形如鼠後用野菊花焙黃為末陳醋調貼一日一換七日全好萬病回春乳癧潰爛幾見臟腑土楝樹子經霜者妙川楝不用雄鼠屎兩頭尖者是露蜂房各三錢俱煅存性共末每服三錢酒下間三日一服不數日膿盡收斂抄本瘰癧初起成塊未破者將面捏成薄條照瘡大小略離患處作圈圈著再取槐樹根在土內掘出者白皮數條照面皮作圈放麵皮之上用艾作小丸放癧子中心灸之肉上略覺痛即拂去艾丸另取艾丸再灸三遍其麵皮不動槐根白皮要換三次連灸三日即消一方不拘已破未破瀝青好者一兩萆麻子四十九粒杏仁去皮尖十三粒半共搗千餘捶自然黏軟成膏攤貼患處神應內服昆布海藻海帶貝母連翹甘草元參以應無不愈者祕方集驗痔瘡腸僻為痔如大澤中有少山突出為痔凡人於九竅中但有小肉突起皆曰痔不特於肛門邊生者名之亦有鼻痔眼痔牙痔等其狀不一方分五種曰牡曰牝曰胍曰腸曰氣牝痔者肛門邊生瘡腫突出一日數枚膿潰即散牡痔者肛門邊發露肉珠狀如鼠奶時時滴潰膿血胍痔者腸口顆顆發纍且痛且癢血出淋漓腸痔者肛門內結核有血寒熱往來登溷脫出氣痔者遇恐怒則發肛門腫痛氣散則愈又有酒痔每遇飲酒發動瘡即腫痛而流血血痔者每遇大便則血出不止宜解熱調血順氣為主若久而不愈必至穿穴為漏矣治痔油藥蘇合油熊膽各五分頭生雞子二個用清煎油三味勻和敷之神效有一趙姓者患痔垂死用此立愈靈祕丹藥藥水片腦一分朴硝五分熊膽三分蝸牛螺肉各十兩橄欖核燒灰五錢搗爛入藥浸一夜取水並藥敷瘡無不斷根同上痔漏犀角象牙各末乳香沒藥各一兩明礬黃占各五錢銅器溶化占入藥丸梧子大取連翹金銀花二味貯瓶中入好酒煎半日去渣酒服草一丸自愈洪武帝親驗方一用胡連一兩末甲片麻油炙石決明煅槐花炒各五錢蜜丸早晚各服一錢如四旁有硬肉突出蠶繭二十個炒研入藥即治神效單方全集一用青苔青石上出焙末加生礬少許再研聽用先將瓦花一把水煎滾加鹽滷一碗坐上浴洗其痔漸漸縮小揩乾將藥抹上但要痛三四次即愈永不再發外科祕録諸癤附火丹對口癤初起桃葉尖九個搗爛摻入愈一用母雞屎抱小雞熱屎取塗一用鮮茄蒂七個鮮何首烏輕粉各等分水二盅煎八分一服出膿再服收口一用豬苦膽剖開碗盛塗完即愈男用雄豬膽女用母豬膽單方全集治對口癤神效方天茄即白牽牛葉帶莖子採來同生薑三片搗敷早晚一換三日全愈抄本熱癤五月五日午時取獨郎大蒜切片貼眉心至夏不發一用菊花根搗汁無灰酒沖服癤在上身空心服癤在下身飽服自消祕方總集小面癤採二蠶桑葉滴下支水點上愈古方諸癤孔內凸出胬肉取烏梅肉搗爛量大小攤貼即消神妙無比本草𤺪疒貢癤皮底舊鞋一隻去泥淨燒灰存性研末菜油調敷其膿自出屢試有效一用屋內倒挂煙塵豬膽汁調敷一用磁器捶碎如粉雞子清調敷一用百草霜研細菜油調圍立效俱驗過單方祕録火丹滿身生遍形如水泡煮用小兒胎衣瓶內水將雞毛抹上隨手而愈單方白蛇纏腰腰裡起紅泡一圈若不早治被其纏到者不救纏腰如袴腰樣蛇殼一條燒灰存性坑廁板上浮泥刮下同研細用童便調敷數次一二日即愈一用白芨八錢水龍骨糞般者妙共研末無根水調敷一用鍋臍灰將臭飯腳水調敷單方祕録諸般流火野芥臘子四五錢研細醋調敷上衛生備要諸瘡棉花瘡水銀一兩白錫一兩先化鍋入水銀為末聽用銀珠六錢銅緑五錢官粉二兩黃香一兩五錢硃砂輕粉各五錢上為末用前藥一股先攤紙上其紙條長七寸加後藥二股亦同攤紙條上捲成條無太緊臨用時蘸香油點著橫放瓦上令患者覆睡以手托席用被蓋矇頭不令走氣口鼻閉息如忍不住略轉動氣即閉先一條熏眉心次一條熏鳩尾第三條熏臍下一寸次第熏汗如雨熏盡後睡五日愈錢氏祕方臁瘡鉛一兩打極薄片剪碎和水銀三錢入去衣豬板油研爛攤油紙上外以川椒二兩煎湯洗淨貼之即五六年者可愈或黃牛屎尖用陰陽水各一碗和勻化開濾去渣要醋一碗大冬青葉四十九片砂罐內文武火煮乾留水醋半盞浸在內每日換三次貼瘡葉盡即消永不發單用冬青葉醋煮熟貼亦效單方臁瘡潰爛川椒松香黃蠟各一錢四分共研忌鐵器用連根蔥白十四段共搗爛做夾紙膏攤貼效心岐傳血風瘡癬瘡蟲瘡坐板瘡疥癩瘡並效大楓子肉五錢蛇床子五錢水銀二錢枯礬白錫各一錢為末先將錫化開次入水銀再入末藥柏油共搗勻搽瘡宜幹些臘豬油亦可用單方祕録膿疥瘡煙膏一兩東丹一兩雄黃硫黃各三錢輕粉一錢為末醃豬油調抹如連片將油紙攤藥縛好不動三日脫光集驗祕方惡瘡雄黃一錢五分杏仁三十粒去皮輕粉一錢為末洗淨以豬膽汁調上二三日即愈百發百中種德堂方天泡瘡天蘿水調宮粉敷上立愈若日欠作爛疼痛不已膿水淋漓者石膏煅輕粉各一兩青黛等分為末瓦花汁調抹立效外科備要坐板瘡松香五錢雄黃一錢如濕加蒼朮二錢為末和勻綿紙包捻作紙條二個臘豬油溶化浸透火燒滴下油搽瘡上立效先醒齋筆記凍瘡五倍子豬油搗成膏填入裂凍耳用薑汁煎除凍腳跟茄根煎湯洗凍折油胭脂烘熱敷之立效集驗祕方抓瘡傷水腫痛難忍者用耳垢封之一夕水盡出全愈鄭云甫云豫常病此一丐傳此方採醫書火珠瘡其瘡如珠始於發中相染不已亦有傷命者用生蘿蔔搗爛將滴醋浸敷患處寒濕瘡雞子煮熟去白用黃慢火炒去油加黃柏末摻上立效金絲瘡形如繩線巨細不一上下至心即死治法於瘡頭截住刺之出血後嚼浮萍塗之即愈俱出集驗黃水瘡取雄豬膽一個黃柏一兩浸焙乾為末敷之周氏抄本瘌痢瘡酒肉店內油透陳竹燈臺一個劈碎裝磁瓶內口上用舊髻鐵絲覆瓶上倒轉下再用一空磁瓶以此瓶合於下瓶口上用火煅之其汁溜下取抹瘡神效一用石灰窯內燒過紅土基流結上渣輕虛而色赬者四兩百草霜雄黃各一兩膽礬六錢榆皮三錢輕粉一錢豬膽汁調剃頭搽之效積德堂陸氏方一用花椒煎湯或苦參湯洗淨豬骨髓或黃連末搽神效周氏抄録漆瘡木形人遇漆起泡發癢變瘡肢腫作痛甚者寒熱交作用蟹唾抹之或磨刀水泥塗或杉木煎湯洗或蟹殼滑石研末乾者蜜和塗之濕者乾末摻之或石膏輕粉韭汁調敷之內服元參知母石膏人中黃黃連升麻連翹牛蒡各等分甘草五分淡竹葉二十片煎之不拘時服忌浴熱水兼戒口味否則變為頑風癬愈而又發者多矣祕方集驗肥瘡極凶者屢試屢驗苦參胡麻首烏靈仙甘草石菖蒲當歸生地連翹蟬蛻金錢花酒煎服一用大楓子肉五錢白信三分油胡桃五個共搗勻作三丸夜間取一丸在心口用手擦至二更天氣藥散開仍聚胸膛仰面而臥次夕亦然間一夜再擦一丸七日後全愈鴻喜東方傳方頭面肥瘡輕粉飛丹雄黃白礬等分研末入蔥管內兩頭扎煨過加龜板灰少許研菜油調抹立效經驗良方面上毒瘡初起者急尋水蜒蚰一二條用醬少許共搗塗紙上貼之即退紙上留小孔出氣此乃凌潢章祕傳極效方也談野翁試驗方海上仙方頭面瘡剝皮瘡牛皮破鞋各一兩白礬硫磺各五錢舊氈三錢一處燒為細末豬油加面調連擦三次須烤乾坐板黃水臁腿瘡風癬疥癩一掃光孫真人傳諸瘡不論肥膕膿疥濕風坐板神妙硫黃三錢雞蛋二個煮熟去白用黃用黃銅器內微炒取油聽用胡椒四十九粒為末菜油四兩川椒三錢去核焙末將二椒末並蛋油黃入菜油內熬數沸擦瘡神驗如疥瘡加飛礬少許醫方祕授諸般癬瘡楊梅癬枯礬硫磺各一兩八錢雄黃膽礬輕粉各一錢川椒三錢用生板油去皮入藥擦破數次其效如神一用乳香五分硃砂雄黃沒藥兒茶各一錢大楓子草個杏仁四十粒搗爛絹布擦之癬瘡蔓延決明子一兩為末入水銀輕粉少許研不見星擦破上藥立瘥東坡家藏方一用斑蝥雄黃銅青等分為末無根水調敷起泡刺破桕燭油敷五六次潔淨不發一用杜黃連即羊蹄根一握洗淨搗濾汁用白梅數枚去核同汁搗爛用甲片刮破患處抹數次即愈神效屢驗方鵝掌風癬川烏草烏何首烏花粉赤芍防風荊芥蒼朮地丁各一兩艾葉四兩煎先熏後洗層層起皮痛癢愈醫方祕録荷葉癬田螺一個開靨入信二分待肉化水抹上即痊古方牛皮癬及年久頑癬神效紅粉霜五分明礬川槿皮杏仁去油皮一錢密陀僧三錢為末津調抹一日三次三日全愈一用牛皮燒灰油調敷立愈赤水玄珠牛皮血癬九硫一信三巴豆俱為細末菜油調古仙方頑癬白信一分硫磺九分硝三分白礬四分冰片半分為末津調擦之祕方圈癬榖樹皮剪如癬樣大小以毛背一面用唾貼肉以手不時撲之即愈祕方集驗獸蟲傷咬家犬咬先須忍痛以河水捏淨血水為主生虎骨刮末擦咬處即愈或刮肉店墩板上油膩拌砂糖敷效感應篇刻虎傷搗青松汁數斗頻頻飲之以渣敷咬傷處頻易即效古方馬咬及踏傷服童便韭汁妙寒水石末敷傷處旬日亦愈集驗方貓咬薄荷汁塗之有效戴厚禮方鼠咬斑蝥燒灰麝香少許津唾調敷或抹貓尿單方纂要蛇咬細辛白芷各五錢雄黃五分每服二錢末酒下即效抄本蜈蚣咬取蜘蛛置咬處自吮其毒痛即止古仙方八腳蟲傷其蟲隱壁間以尿射人遍身生瘡狀如湯火傷烏雞翎燒灰雞子清調敷單方全集蝸牛咬毒行遍身者青蓼子煎水浸之立愈不可近陰令弱也本草蜘蛛咬大藍汁一碗入雄黃麝香少許點患處仍服其汁神異之極昔一人被傷頭面腫痛幾不救服此兩日作瘡愈傳信方蟢蛛傷其蟲咬人至死惟以桑柴灰煎取汁調白礬末傳效蜂蠆毒小便洗擦拭乾用香油搽之或雄黃末擦之或蜂房末搽之皆效祕方集驗蠍螫毒蠍有雌雄兩種雄者螫人痛在一處雌者螫人痛牽便體用井底泥敷患處干則再易或新汲水以青布隨痛處搭之濕則再易祕方鐵胡蜂刺取芋艿莽擦患處其腫即止無莽用子亦可集驗方壁虎咬以清水淋壁上注咬傷處自愈經驗良方諸色惡蟲咬傷薑汁先洗用明礬雄黃貼之立效屢驗神方諸般奇症截腸大腸頭出名曰截腸初截寸余者可治若腸盡不治用芝麻油盛於器臀坐上飲天麻子汁數升愈本草蝨出怪病臨臥渾身蝨出血肉俱壞每夕漸多痛癢難言且舌尖出血身齒俱黑唇動鼻開但飲鹽醋湯半月即安夏子益奇疾方筋肉化蟲有蟲如蟹走於皮下作聲如兒啼急用雄黃雷丸各一兩為末摻豬肉上炙熟吃盡自愈奇疾方惡肉毒瘡一女年十四腕軟處生物如豆半在肉中紅紫色痛甚方士用水銀四兩白紙二張揉熟蘸擦之三日自落李樓怪症方行步歪邪昔一士兩足不酸不痛每行動絶不聽其所用或扭於左而又墜於右或扭於右而又墜於左之立而行不能一步步正走孫文垣以為由筋軟不能束骨所致用人參黃耆白芍以補肺金苡仁虎骨龜板杜仲以壯筋骨以鐵華粉專制肝木煉蜜為丸早晚服之竟愈三吳治驗破腸腸破腸出鼻穢急以香油摸腸用手送入煎人參枸杞淋之皮自合矣吃羊腎粥十日即愈奇疾方胍溢毛竅血出若血不出其脹如臌須臾眼耳口鼻被氣脹合此名胍溢飲生薑汁水各一盞即安奇方試驗大腸蟲出行坐不得用鶴蝨灰水調五錢服之自愈奇症單方腎水玉莖硬不酸精流無歇乃為腎滿用韭菜子破故紙各兩為末每服二錢水一鍾煎六分分作三次飲愈則停服經驗良方咽喉生肉咽喉層層生肉相疊漸漸腫起
